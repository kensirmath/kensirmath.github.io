<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>與朋友拆帳單 - 精度加強版</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #f3f0ec; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #6f6d68; --color-text-faint: #9c9991; --color-text-inverse: #f9f8f4;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8;
      --color-success: #437a22; --color-success-highlight: #d4dfcc;
      --color-warning: #964219; --color-warning-highlight: #ddcfc6;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(40,37,29,0.06); --shadow-md: 0 8px 24px rgba(40,37,29,0.08);
      --font-body: 'Satoshi', 'Inter', sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #22211f; --color-border: #393836; --color-divider: #2a2927;
      --color-text: #e0dfdb; --color-text-muted: #aba8a1; --color-text-faint: #7b7872; --color-text-inverse: #171614;
      --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
      --color-success: #76b851; --color-success-highlight: #364330;
      --color-warning: #cb7d54; --color-warning-highlight: #4e4038;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); line-height: 1.55; color: var(--color-text); background: var(--color-bg); transition: background var(--transition); }
    .app-shell { max-width: 1400px; margin: 0 auto; padding: var(--space-4); }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: var(--space-6) 0; }
    .hero { display: grid; grid-template-columns: 350px 1fr; gap: var(--space-6); }
    .panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-6); box-shadow: var(--shadow-sm); }
    .field { display: grid; gap: var(--space-2); margin-bottom: var(--space-4); }
    label { font-weight: 700; font-size: var(--text-sm); }
    .input, .select { width: 100%; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.8rem; background: var(--color-surface-2); color: var(--color-text); }
    .btn { padding: 0.8rem 1.2rem; border-radius: var(--radius-md); cursor: pointer; font-weight: 700; border: none; transition: transform var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-secondary { background: var(--color-surface-2); border: 1px solid var(--color-border); color: var(--color-text); }
    .table-wrap { overflow-x: auto; margin-top: 1rem; border-radius: var(--radius-lg); border: 1px solid var(--color-border); }
    table { width: 100%; border-collapse: collapse; background: var(--color-surface-2); min-width: 800px; }
    th, td { padding: 1rem; border-bottom: 1px solid var(--color-divider); text-align: center; }
    th { background: var(--color-surface-offset); font-size: var(--text-sm); }
    .money-cell { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
    .settlement-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-top: var(--space-6); }
    .settle-card { padding: var(--space-5); background: var(--color-surface-2); border-radius: var(--radius-lg); border: 1px solid var(--color-border); }
    .warn-box { padding: 1rem; background: var(--color-warning-highlight); color: var(--color-warning); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: 1rem; display: none; border: 1px solid var(--color-warning); }
    .friends-picker { display: grid; gap: 0.5rem; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    .friend-check { display: flex; align-items: center; gap: 0.5rem; font-size: var(--text-sm); background: var(--color-bg); padding: 0.5rem; border-radius: var(--radius-sm); }
    .remove-btn { color: var(--color-warning); background: none; border: 1px solid var(--color-warning); padding: 0.3rem 0.6rem; border-radius: var(--radius-sm); font-size: var(--text-xs); cursor: pointer; }
    @media (max-width: 1000px) { .hero { grid-template-columns: 1fr; } .settlement-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 style="margin:0;">好友拆帳助手</h1>
        <p style="margin:0; color:var(--color-text-muted); font-size:var(--text-sm);">項目精度 0.01 | 結算精度 0.1</p>
      </div>
      <button class="btn btn-secondary" onclick="toggleTheme()">切換深淺模式</button>
    </header>

    <main class="hero">
      <aside class="sidebar panel">
        <section>
          <h3>1. 管理成員</h3>
          <div class="field">
            <div style="display:flex; gap:0.5rem;">
              <input id="friendName" class="input" type="text" placeholder="名字..." onkeypress="if(event.key==='Enter') addFriend()"/>
              <button class="btn btn-primary" onclick="addFriend()">加入</button>
            </div>
          </div>
          <div id="friendList" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem;"></div>
        </section>

        <section>
          <h3>2. 新增分項</h3>
          <div class="field">
            <label>項目名稱</label>
            <input id="itemName" class="input" type="text" placeholder="例如：晚餐、計程車" />
          </div>
          <div class="field">
            <label>金額 (精確至 0.01)</label>
            <input id="itemAmount" class="input" type="number" step="0.01" placeholder="0.00" />
          </div>
          <div class="field">
            <label>誰付的錢？</label>
            <select id="itemPaidBy" class="select"></select>
          </div>
          <div class="field">
            <label>拆帳方式</label>
            <select id="itemSplitMode" class="select" onchange="toggleSplitMode()">
              <option value="equal">平均分配</option>
              <option value="custom">手動輸入 (不均分)</option>
            </select>
          </div>

          <div id="customEditorArea" style="display:none; border: 1px dashed var(--color-border); padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1rem; background: var(--color-surface-offset);">
            <p id="customTotalHint" style="font-size: var(--text-xs); margin-top:0; color:var(--color-primary);">請輸入每人應負擔金額：</p>
            <div id="customAmountEditor" class="friends-picker"></div>
          </div>

          <div class="field">
            <label>參與分錢的人</label>
            <div id="participantPicker" class="friends-picker"></div>
          </div>
          <button class="btn btn-primary" onclick="createItem()" style="width: 100%;">確認加入帳單</button>
        </section>
      </aside>

      <section class="workspace">
        <div id="validationBox" class="warn-box"></div>
        
        <div class="panel" style="padding: 0;">
          <div class="table-wrap">
            <table>
              <thead id="billHead"></thead>
              <tbody id="billBody"></tbody>
              <tfoot id="billFoot"></tfoot>
            </table>
          </div>
        </div>

        <div class="settlement-grid">
          <div class="settle-card">
            <h3 style="margin-top:0;">每人收支結算 (至 0.1)</h3>
            <div id="personSummary"></div>
          </div>
          <div class="settle-card">
            <h3 style="margin-top:0;">建議轉帳路徑</h3>
            <div id="transferList"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let state = { friends: [], items: [] };

    // 精度核心邏輯
    const roundToTwoDecimals = (n) => Math.round((n + Number.EPSILON) * 100) / 100;
    const roundToOneDecimal = (n) => Math.round((n + Number.EPSILON) * 10) / 10;
    const formatMoney = (n, dec = 2) => Number(n).toLocaleString('zh-HK', { minimumFractionDigits: dec, maximumFractionDigits: dec });

    function addFriend() {
      const input = document.getElementById('friendName');
      const name = input.value.trim();
      if (name && !state.friends.includes(name)) {
        state.friends.push(name);
        input.value = '';
        render();
      }
    }

    function toggleSplitMode() {
      const mode = document.getElementById('itemSplitMode').value;
      document.getElementById('customEditorArea').style.display = (mode === 'custom') ? 'block' : 'none';
      renderCustomInputs();
    }

    function renderCustomInputs() {
      const container = document.getElementById('customAmountEditor');
      container.innerHTML = '';
      state.friends.forEach(name => {
        const div = document.createElement('div');
        div.className = 'field';
        div.style.marginBottom = '0.5rem';
        div.innerHTML = `
          <label style="font-size:10px">${name}</label>
          <input type="number" step="0.01" class="input custom-amt-input" data-name="${name}" placeholder="0.00" style="padding:0.4rem">
        `;
        container.appendChild(div);
      });
    }

    function createItem() {
      const name = document.getElementById('itemName').value;
      const totalAmount = roundToTwoDecimals(parseFloat(document.getElementById('itemAmount').value) || 0);
      const mode = document.getElementById('itemSplitMode').value;
      const paidBy = document.getElementById('itemPaidBy').value;
      const participants = [...document.querySelectorAll('#participantPicker input:checked')].map(i => i.value);

      if (!name || totalAmount <= 0 || !paidBy) {
        alert("請完整填寫項目名稱、金額並確保已加入朋友。");
        return;
      }

      let customShares = {};
      if (mode === 'custom') {
        let runningSum = 0;
        document.querySelectorAll('.custom-amt-input').forEach(input => {
          const val = roundToTwoDecimals(parseFloat(input.value) || 0);
          customShares[input.dataset.name] = val;
          runningSum = roundToTwoDecimals(runningSum + val);
        });

        // CRITICAL CHECK: 金額必須完全相等
        if (Math.abs(runningSum - totalAmount) > 0.001) {
          alert(`金額校對失敗！\n項目總計：$${totalAmount}\n目前分配總和：$${runningSum}\n相差：$${roundToTwoDecimals(totalAmount - runningSum)}`);
          return;
        }
      }

      state.items.push({ id: Date.now(), name, amount: totalAmount, mode, paidBy, participants, customShares });
      
      // Reset inputs
      document.getElementById('itemName').value = '';
      document.getElementById('itemAmount').value = '';
      render();
    }

    function calculateNet() {
      const net = Object.fromEntries(state.friends.map(f => [f, 0]));

      state.items.forEach(item => {
        if (item.mode === 'equal') {
          const share = roundToTwoDecimals(item.amount / item.participants.length);
          item.participants.forEach(p => {
            net[p] = roundToTwoDecimals(net[p] + share);
          });
          // 均分餘數校正：由付款人吸收差額
          const totalDistributed = roundToTwoDecimals(share * item.participants.length);
          const remainder = roundToTwoDecimals(item.amount - totalDistributed);
          net[item.paidBy] = roundToTwoDecimals(net[item.paidBy] + remainder);
        } else {
          Object.entries(item.customShares).forEach(([p, amt]) => {
            net[p] = roundToTwoDecimals(net[p] + amt);
          });
        }
        // 付款人先墊付（餘數已在上面補齊）
        net[item.paidBy] = roundToTwoDecimals(net[item.paidBy] - item.amount);
      });

      return net;
    }

    function render() {
      // 1. 成員管理區
      document.getElementById('friendList').innerHTML = state.friends.map(f => `
        <span class="btn btn-secondary" style="padding:0.4rem 0.8rem; font-size:var(--text-sm)">
          ${f} <button onclick="removeFriend('${f}')" style="background:none; border:none; color:var(--color-warning); cursor:pointer; margin-left:5px">×</button>
        </span>
      `).join('');

      // 2. 更新表單下拉清單
      document.getElementById('itemPaidBy').innerHTML = state.friends.map(f => `<option value="${f}">${f}</option>`).join('');
      document.getElementById('participantPicker').innerHTML = state.friends.map(f => `
        <label class="friend-check"><input type="checkbox" value="${f}" checked>${f}</label>
      `).join('');

      // 3. 表格渲染
      const head = document.getElementById('billHead');
      head.innerHTML = `<tr><th>項目</th><th>總額</th>${state.friends.map(f => `<th>${f}</th>`).join('')}<th>管理</th></tr>`;

      const body = document.getElementById('billBody');
      body.innerHTML = state.items.map(item => {
        return `<tr>
          <td style="text-align:left"><b>${item.name}</b><br><small style="color:var(--color-text-muted)">${item.mode==='equal'?'均分':'手動'}</small></td>
          <td class="money-cell">$${formatMoney(item.amount)}</td>
          ${state.friends.map(f => {
            let val = 0;
            if (item.mode === 'custom') val = item.customShares[f] || 0;
            else if (item.participants.includes(f)) val = roundToTwoDecimals(item.amount / item.participants.length);
            if (item.paidBy === f) val -= item.amount;
            const color = val > 0 ? 'var(--color-warning)' : (val < 0 ? 'var(--color-success)' : 'inherit');
            return `<td class="money-cell" style="color:${color}">${val === 0 ? '-' : formatMoney(val)}</td>`;
          }).join('')}
          <td><button class="remove-btn" onclick="removeItem(${item.id})">刪除</button></td>
        </tr>`;
      }).join('');

      // 4. 結算與過數 (精度 0.1)
      const net = calculateNet();
      const summary = document.getElementById('personSummary');
      summary.innerHTML = Object.entries(net).map(([name, val]) => {
        const finalVal = roundToOneDecimal(val);
        const label = finalVal > 0 ? '應支付' : (finalVal < 0 ? '應收回' : '已結清');
        const color = finalVal > 0 ? 'var(--color-warning)' : (finalVal < 0 ? 'var(--color-success)' : 'inherit');
        return `
          <div style="display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid var(--color-divider);">
            <span><b>${name}</b></span>
            <span style="color:${color}; font-weight:700">${label} $${formatMoney(Math.abs(finalVal), 1)}</span>
          </div>
        `;
      }).join('');

      renderTransfers(net);
      if(state.friends.length > 0 && document.getElementById('customAmountEditor').children.length === 0) renderCustomInputs();
    }

    function renderTransfers(net) {
      const debtors = [];
      const creditors = [];
      Object.entries(net).forEach(([name, val]) => {
        const rounded = roundToOneDecimal(val);
        if (rounded > 0.01) debtors.push({ name, amt: rounded });
        else if (rounded < -0.01) creditors.push({ name, amt: Math.abs(rounded) });
      });

      const transfers = [];
      let i = 0, j = 0;
      // 簡單的債務抵銷演算法
      while (i < debtors.length && j < creditors.length) {
        const payAmt = Math.min(debtors[i].amt, creditors[j].amt);
        if (payAmt > 0) {
          transfers.push(`
            <div style="margin-bottom:0.5rem; background:var(--color-bg); padding:0.8rem; border-radius:var(--radius-sm);">
              ${debtors[i].name} ➔ ${creditors[j].name} 支付 <b style="color:var(--color-primary)">$${formatMoney(payAmt, 1)}</b>
            </div>
          `);
        }
        debtors[i].amt = roundToOneDecimal(debtors[i].amt - payAmt);
        creditors[j].amt = roundToOneDecimal(creditors[j].amt - payAmt);
        if (debtors[i].amt <= 0.05) i++;
        if (creditors[j].amt <= 0.05) j++;
      }

      document.getElementById('transferList').innerHTML = transfers.length ? transfers.join('') : '<p style="color:var(--color-text-faint)">暫無過數需求</p>';
    }

    function removeItem(id) {
      state.items = state.items.filter(i => i.id !== id);
      render();
    }

    function removeFriend(name) {
      state.friends = state.friends.filter(f => f !== name);
      state.items = state.items.filter(item => item.paidBy !== name); // 刪除該成員支付的項目
      render();
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    // 初始化渲染
    render();
  </script>
</body>
</html>
