<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幸運抽獎</title>

  <style>
    :root {
      --bg1: #09111f;
      --bg2: #172a4b;
      --panel: rgba(255, 255, 255, 0.10);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f7fbff;
      --muted: #b7c6df;
      --primary: #53d8fb;
      --gold: #ffd166;
      --success: #69e6a4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang HK", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(83, 216, 251, 0.18), transparent 28%),
        radial-gradient(circle at 85% 85%, rgba(255, 209, 102, 0.15), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .page {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }

    header {
      margin-bottom: 28px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.08em;
      text-shadow: 0 0 26px rgba(83, 216, 251, 0.55);
    }

    header p {
      margin: 12px 0 0;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .panel {
      min-height: 500px;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .hint {
      min-height: 40px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    textarea {
      width: 100%;
      height: 330px;
      resize: vertical;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      outline: none;
      color: var(--text);
      background: rgba(3, 10, 24, 0.42);
      font: inherit;
      line-height: 1.55;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(83, 216, 251, 0.15);
    }

    textarea[readonly] {
      opacity: 0.95;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 13px;
    }

    .button-row.two-buttons {
      grid-template-columns: repeat(2, 1fr);
    }

    button {
      min-height: 42px;
      padding: 9px 12px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      color: #06101d;
      background: #dbe9ff;
      font: inherit;
      font-weight: 700;
      transition: transform 0.16s ease, filter 0.16s ease, opacity 0.16s ease;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .paste-btn {
      background: #a8d8ff;
    }

    .clear-btn {
      background: #ffb3bd;
    }

    .center-panel {
      grid-column: 1 / -1;
      display: flex;
      min-height: 430px;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .draw-controls {
      width: 100%;
      max-width: 520px;
      margin-top: 24px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    input[type="number"] {
      width: 100%;
      max-width: 220px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background: rgba(3, 10, 24, 0.42);
      font: inherit;
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
    }

    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(83, 216, 251, 0.15);
    }

    #drawButton {
      width: 100%;
      min-height: 58px;
      margin-top: 22px;
      color: #172033;
      background: linear-gradient(135deg, var(--gold), #ff9e5e);
      box-shadow: 0 8px 24px rgba(255, 178, 73, 0.28);
      font-size: 1.15rem;
    }

    .counter {
      min-height: 25px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .effect-box {
      position: relative;
      display: grid;
      width: min(100%, 320px);
      height: 205px;
      place-items: center;
      overflow: hidden;
      margin-top: auto;
      margin-bottom: auto;
      border: 1px solid rgba(83, 216, 251, 0.35);
      border-radius: 22px;
      background:
        radial-gradient(circle, rgba(83, 216, 251, 0.23), transparent 60%),
        rgba(0, 0, 0, 0.18);
    }

    .effect-icon {
      z-index: 2;
      font-size: 4rem;
      filter: drop-shadow(0 0 15px rgba(255, 209, 102, 0.8));
    }

    .effect-message {
      z-index: 2;
      margin-top: -55px;
      color: #e9f7ff;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .orb {
      position: absolute;
      width: 19px;
      height: 19px;
      border-radius: 50%;
      opacity: 0;
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
    }

    .effect-box.running {
      animation: pulse 0.55s ease-in-out infinite alternate;
    }

    .effect-box.running .effect-icon {
      animation: bounce 0.38s ease-in-out infinite alternate;
    }

    .effect-box.running .orb {
      opacity: 1;
      animation: orbit 1s linear infinite;
    }

    .orb:nth-child(3) {
      background: var(--gold);
      box-shadow: 0 0 15px var(--gold);
      animation-delay: -0.33s !important;
    }

    .orb:nth-child(4) {
      background: var(--success);
      box-shadow: 0 0 15px var(--success);
      animation-delay: -0.66s !important;
    }

    .status {
      min-height: 24px;
      margin-top: 15px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .status.error {
      color: #ffb3bd;
    }

    .status.success {
      color: #a9f2c8;
    }

    /* ===== 全頁魔法抽獎效果 ===== */

    .draw-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      place-items: center;
      overflow: hidden;
      color: #fff;
      background: rgba(3, 7, 20, 0.76);
      backdrop-filter: blur(12px) saturate(1.35);
      -webkit-backdrop-filter: blur(12px) saturate(1.35);
    }

    .draw-overlay.show {
      display: grid;
      animation: overlayIn 0.35s ease-out both;
    }

    .draw-overlay.drawing {
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 222, 130, 0.16), transparent 13%),
        radial-gradient(circle at 25% 30%, rgba(86, 231, 255, 0.30), transparent 25%),
        radial-gradient(circle at 78% 68%, rgba(255, 65, 184, 0.28), transparent 27%),
        radial-gradient(circle at 50% 100%, rgba(123, 83, 255, 0.24), transparent 35%),
        rgba(2, 4, 20, 0.86);
      animation:
        overlayIn 0.35s ease-out both,
        screenShakeCrazy 0.28s linear infinite,
        colorShift 2.2s ease-in-out infinite alternate;
    }

    /* 白光揭曉 */
    .draw-overlay.reveal {
      background:
        radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(255, 242, 181, 0.92) 8%,
          rgba(255, 165, 73, 0.58) 22%,
          rgba(255, 70, 161, 0.28) 43%,
          rgba(3, 7, 20, 0.90) 76%
        );
      animation:
        winnerWhiteFlash 1.15s cubic-bezier(.16, .8, .2, 1) both,
        revealPulse 1.6s ease-out both;
    }

    .fireworks-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .magic-rings {
      position: absolute;
      z-index: 1;
      top: 50%;
      left: 50%;
      width: min(88vw, 900px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .magic-ring {
      position: absolute;
      inset: 50%;
      border: 3px solid rgba(126, 238, 255, 0.76);
      border-radius: 50%;
      opacity: 0;
      box-shadow:
        0 0 18px rgba(83, 216, 251, 0.9),
        inset 0 0 30px rgba(83, 216, 251, 0.25);
    }

    .magic-ring::before,
    .magic-ring::after {
      position: absolute;
      width: 16px;
      height: 16px;
      content: "";
      border-radius: 50%;
      background: #fff5a8;
      box-shadow: 0 0 18px 6px #ffd166;
    }

    .magic-ring::before {
      top: -8px;
      left: 50%;
    }

    .magic-ring::after {
      right: -8px;
      bottom: 50%;
    }

    .draw-overlay.drawing .magic-ring {
      opacity: 1;
    }

    .ring-one {
      width: 42%;
      height: 42%;
      transform: translate(-50%, -50%);
      animation: ringSpin 1.15s linear infinite;
    }

    .ring-two {
      width: 66%;
      height: 66%;
      border-color: rgba(255, 104, 193, 0.70);
      transform: translate(-50%, -50%);
      box-shadow:
        0 0 24px rgba(255, 81, 178, 0.86),
        inset 0 0 36px rgba(255, 81, 178, 0.20);
      animation: ringSpinReverse 1.8s linear infinite;
    }

    .ring-three {
      width: 92%;
      height: 92%;
      border-style: dashed;
      border-color: rgba(255, 213, 95, 0.65);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 32px rgba(255, 209, 102, 0.75);
      animation:
        ringSpin 3s linear infinite,
        ringBreath 0.55s ease-in-out infinite alternate;
    }

    .magic-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18%;
      aspect-ratio: 1;
      border-radius: 50%;
      opacity: 0;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, #fff 0 8%, #ffe887 15%, #ff79c6 40%, rgba(83, 216, 251, 0.12) 68%, transparent 72%);
      box-shadow:
        0 0 38px 16px rgba(255, 222, 115, 0.92),
        0 0 100px 44px rgba(255, 73, 183, 0.34);
    }

    .draw-overlay.drawing .magic-core {
      opacity: 1;
      animation: corePulse 0.38s ease-in-out infinite alternate;
    }

    .meteor-field {
      position: absolute;
      z-index: 1;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .meteor {
      position: absolute;
      width: 180px;
      height: 4px;
      border-radius: 999px;
      opacity: 0;
      transform: rotate(-36deg);
      background: linear-gradient(90deg, transparent, currentColor);
      box-shadow: 0 0 12px currentColor, 0 0 24px currentColor;
    }

    .meteor-1 { top: 8%; left: -25%; color: #53d8fb; }
    .meteor-2 { top: 22%; left: -36%; color: #ff69bf; animation-delay: 0.35s !important; }
    .meteor-3 { top: 40%; left: -18%; color: #ffe16b; animation-delay: 0.8s !important; }
    .meteor-4 { top: 58%; left: -38%; color: #9f8cff; animation-delay: 1.15s !important; }
    .meteor-5 { top: 73%; left: -20%; color: #6effba; animation-delay: 1.6s !important; }
    .meteor-6 { top: 88%; left: -42%; color: #ff9b62; animation-delay: 2.05s !important; }

    .draw-overlay.drawing .meteor {
      animation: meteorRush 1.35s linear infinite;
    }

    .energy-wave {
      position: absolute;
      z-index: 1;
      top: 50%;
      left: 50%;
      width: 15px;
      aspect-ratio: 1;
      border: 4px solid rgba(255, 235, 134, 0.85);
      border-radius: 50%;
      opacity: 0;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 24px rgba(255, 201, 80, 0.8);
      pointer-events: none;
    }

    .draw-overlay.drawing .energy-wave {
      animation: energyExpand 1.3s ease-out infinite;
    }

    .wave-two {
      border-color: rgba(83, 216, 251, 0.78);
      animation-delay: 0.43s !important;
    }

    .wave-three {
      border-color: rgba(255, 96, 183, 0.72);
      animation-delay: 0.86s !important;
    }

    .overlay-content {
      position: relative;
      z-index: 3;
      width: min(92vw, 950px);
      text-align: center;
      text-shadow: 0 0 16px rgba(83, 216, 251, 0.9);
    }

    .draw-overlay.drawing .overlay-content {
      animation: contentWarp 0.42s ease-in-out infinite alternate;
    }

    .draw-overlay.reveal .overlay-content {
      animation: revealCelebrate 0.9s cubic-bezier(.15, .9, .2, 1.18) both;
    }

    .mega-icon {
      margin-bottom: 16px;
      font-size: clamp(5rem, 16vw, 12rem);
      filter: drop-shadow(0 0 32px rgba(255, 210, 85, 0.95));
      animation: iconFloat 0.48s ease-in-out infinite alternate;
    }

    .draw-overlay.drawing .mega-icon {
      animation: iconCrazy 0.32s ease-in-out infinite alternate;
    }

    .overlay-title {
      font-size: clamp(1.6rem, 5vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.2em;
    }

    .draw-overlay.drawing .overlay-title {
      animation: titleFlicker 0.55s steps(2, end) infinite;
    }

    .overlay-count {
      min-height: 1.15em;
      margin: 4px 0;
      color: #ffd166;
      font-size: clamp(9rem, 31vw, 24rem);
      font-weight: 1000;
      line-height: 1;
      text-shadow:
        0 0 18px #fff,
        0 0 45px #ffd166,
        0 0 90px #ff8b4a;
    }

    .overlay-count.pop {
      animation: numberPop 0.72s cubic-bezier(.12, .9, .24, 1.35) both;
    }

    .draw-overlay.drawing .overlay-count {
      animation: countThrob 0.38s ease-in-out infinite alternate;
    }

    .overlay-subtext {
      margin-top: 12px;
      color: #dcecff;
      font-size: clamp(1.1rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .laser {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150vmax;
      height: 16px;
      border-radius: 999px;
      opacity: 0.78;
      transform-origin: 0 50%;
      filter: blur(2px);
      background: linear-gradient(90deg, transparent, #53d8fb 45%, #fff 50%, #53d8fb 55%, transparent);
      box-shadow: 0 0 18px #53d8fb, 0 0 45px #53d8fb;
    }

    .laser-a {
      transform: rotate(18deg);
      animation: laserSpin 2.2s linear infinite;
    }

    .laser-b {
      transform: rotate(83deg);
      background: linear-gradient(90deg, transparent, #ff5fa2 45%, #fff 50%, #ff5fa2 55%, transparent);
      box-shadow: 0 0 18px #ff5fa2, 0 0 45px #ff5fa2;
      animation: laserSpin 1.55s linear infinite reverse;
    }

    .laser-c {
      transform: rotate(145deg);
      background: linear-gradient(90deg, transparent, #ffd166 45%, #fff 50%, #ffd166 55%, transparent);
      box-shadow: 0 0 18px #ffd166, 0 0 45px #ffd166;
      animation: laserSpin 2.8s linear infinite;
    }

    .particle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      color: hsl(var(--hue), 100%, 70%);
      opacity: 0;
      background: currentColor;
      box-shadow: 0 0 13px currentColor;
      animation: particleFly 1.55s ease-out infinite;
      animation-delay: var(--delay);
    }

    .draw-overlay.reveal .particle {
      animation-duration: 1.05s;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 0 rgba(83, 216, 251, 0), inset 0 0 10px rgba(83, 216, 251, 0.1); }
      to { box-shadow: 0 0 38px rgba(83, 216, 251, 0.52), inset 0 0 30px rgba(255, 209, 102, 0.2); }
    }

    @keyframes bounce {
      from { transform: scale(1) rotate(-8deg); }
      to { transform: scale(1.18) rotate(8deg); }
    }

    @keyframes orbit {
      0% { transform: rotate(0deg) translateX(76px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(76px) rotate(-360deg); }
    }

    @keyframes overlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes winnerWhiteFlash {
      0% { opacity: 0.75; filter: brightness(1); }
      10% { opacity: 1; filter: brightness(4.2); }
      28% { filter: brightness(1.65); }
      100% { opacity: 1; filter: brightness(1); }
    }

    @keyframes revealPulse {
      0% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @keyframes colorShift {
      from { filter: hue-rotate(0deg) saturate(1.05); }
      to { filter: hue-rotate(34deg) saturate(1.55); }
    }

    @keyframes screenShakeCrazy {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(0); }
      20% { transform: translate3d(-10px, 5px, 0) rotate(-0.25deg); }
      40% { transform: translate3d(10px, -7px, 0) rotate(0.25deg); }
      60% { transform: translate3d(-8px, -6px, 0) rotate(-0.18deg); }
      80% { transform: translate3d(8px, 7px, 0) rotate(0.18deg); }
    }

    @keyframes ringSpin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes ringSpinReverse {
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    @keyframes ringBreath {
      from { scale: 0.96; opacity: 0.55; }
      to { scale: 1.05; opacity: 1; }
    }

    @keyframes corePulse {
      from { transform: translate(-50%, -50%) scale(0.84); filter: hue-rotate(0); }
      to { transform: translate(-50%, -50%) scale(1.32); filter: hue-rotate(55deg); }
    }

    @keyframes meteorRush {
      0% { opacity: 0; transform: translate3d(0, 0, 0) rotate(-36deg) scaleX(0.35); }
      14% { opacity: 1; }
      75% { opacity: 0.95; }
      100% { opacity: 0; transform: translate3d(155vw, 75vh, 0) rotate(-36deg) scaleX(1.25); }
    }

    @keyframes energyExpand {
      0% { width: 15px; opacity: 1; }
      100% { width: min(145vmax, 2200px); opacity: 0; }
    }

    @keyframes contentWarp {
      from { transform: scale(0.98) rotate(-0.7deg); }
      to { transform: scale(1.035) rotate(0.7deg); }
    }

    @keyframes iconCrazy {
      from { transform: scale(0.87) rotate(-15deg); }
      to { transform: scale(1.28) rotate(15deg); }
    }

    @keyframes titleFlicker {
      0%, 100% { opacity: 1; letter-spacing: 0.2em; }
      50% { opacity: 0.58; letter-spacing: 0.28em; }
    }

    @keyframes countThrob {
      from {
        transform: scale(0.88);
        color: #53d8fb;
        text-shadow: 0 0 20px #53d8fb, 0 0 70px #ff5fa2;
      }
      to {
        transform: scale(1.18);
        color: #fff4a3;
        text-shadow: 0 0 24px #fff, 0 0 62px #ffd166, 0 0 120px #ff4fa9;
      }
    }

    @keyframes revealCelebrate {
      0% { opacity: 0; transform: scale(0.25) rotate(-8deg); }
      58% { opacity: 1; transform: scale(1.18) rotate(3deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes laserSpin {
      from { rotate: 0deg; }
      to { rotate: 360deg; }
    }

    @keyframes iconFloat {
      from { transform: scale(0.92) rotate(-8deg); }
      to { transform: scale(1.1) rotate(8deg); }
    }

    @keyframes numberPop {
      0% { opacity: 0; transform: scale(0.15) rotate(-18deg); }
      62% { opacity: 1; transform: scale(1.22) rotate(6deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes particleFly {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) scale(0.3);
      }
      12% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) scale(1.3);
      }
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .center-panel {
        grid-column: auto;
      }

      .panel {
        min-height: auto;
      }

      textarea {
        height: 230px;
      }

      .center-panel {
        min-height: 420px;
      }

      .effect-box {
        margin: 30px 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .draw-overlay,
      .draw-overlay *,
      .effect-box,
      .effect-box * {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <h1>幸運抽獎</h1>
      <p>設定抽獎人數後，一次過抽出全部得獎者。</p>
    </header>

    <section class="layout">
      <section class="panel">
        <h2>參加者名單</h2>
        <p class="hint">每行一個姓名，或使用逗號分隔。重複姓名會自動合併。</p>

        <textarea
          id="participants"
          placeholder="例如：
陳大文
李小美, 王小明
張美玲"
        ></textarea>

        <div class="button-row">
          <button type="button" data-action="copy" data-target="participants">全部複製</button>
          <button type="button" class="paste-btn" data-action="paste" data-target="participants">貼上</button>
          <button type="button" class="clear-btn" data-action="clear" data-target="participants">清除</button>
        </div>
      </section>

      <section class="panel">
        <h2>得獎名單</h2>
        <p class="hint">抽獎特效完成後，所有得獎者會同時顯示在此。</p>

        <textarea id="winners" readonly placeholder="尚未抽獎"></textarea>

        <div class="button-row two-buttons">
          <button type="button" data-action="copy" data-target="winners">全部複製</button>
          <button type="button" class="clear-btn" data-action="clear" data-target="winners">清除</button>
        </div>
      </section>

      <section class="panel center-panel">
        <h2>抽獎控制</h2>

        <div class="draw-controls">
          <label for="winnerCount">抽獎人數</label>
          <input id="winnerCount" type="number" min="1" value="1" inputmode="numeric" />

          <button id="drawButton" type="button">開始抽獎</button>
          <p id="participantCount" class="counter">目前 0 位有效參加者</p>
        </div>

        <div id="effectBox" class="effect-box" aria-live="polite">
          <span class="effect-icon">🎁</span>
          <span id="effectMessage" class="effect-message">等待開始</span>
          <i class="orb"></i>
          <i class="orb"></i>
          <i class="orb"></i>
        </div>

        <p id="status" class="status">請先貼上參加者名單。</p>
      </section>

      <section class="panel">
        <h2>未抽中名單</h2>
        <p class="hint">本輪未獲獎的有效參加者會顯示在此。</p>

        <textarea id="notDrawn" readonly placeholder="尚未抽獎"></textarea>

        <div class="button-row two-buttons">
          <button type="button" data-action="copy" data-target="notDrawn">全部複製</button>
          <button type="button" class="clear-btn" data-action="clear" data-target="notDrawn">清除</button>
        </div>
      </section>
    </section>
  </main>

  <audio id="bgm" preload="auto" loop>
    <source src="./audio/lucky-draw-bgm.mp3" type="audio/mpeg" />
    <source src="./audio/lucky-draw-bgm.ogg" type="audio/ogg" />
  </audio>

  <div id="drawOverlay" class="draw-overlay" aria-hidden="true">
    <canvas id="fireworksCanvas" class="fireworks-canvas"></canvas>

    <div class="magic-rings" aria-hidden="true">
      <div class="magic-ring ring-one"></div>
      <div class="magic-ring ring-two"></div>
      <div class="magic-ring ring-three"></div>
      <div class="magic-core"></div>
    </div>

    <div class="meteor-field" aria-hidden="true">
      <i class="meteor meteor-1"></i>
      <i class="meteor meteor-2"></i>
      <i class="meteor meteor-3"></i>
      <i class="meteor meteor-4"></i>
      <i class="meteor meteor-5"></i>
      <i class="meteor meteor-6"></i>
    </div>

    <div class="energy-wave wave-one"></div>
    <div class="energy-wave wave-two"></div>
    <div class="energy-wave wave-three"></div>

    <div class="laser laser-a"></div>
    <div class="laser laser-b"></div>
    <div class="laser laser-c"></div>

    <div id="particles" class="particles"></div>

    <div class="overlay-content">
      <div class="mega-icon">🎉</div>
      <div id="overlayTitle" class="overlay-title">幸運抽獎</div>
      <div id="overlayCount" class="overlay-count">3</div>
      <div id="overlaySubtext" class="overlay-subtext">得獎者即將誕生</div>
    </div>
  </div>

  <script>
    const participantsEl = document.getElementById("participants");
    const winnersEl = document.getElementById("winners");
    const notDrawnEl = document.getElementById("notDrawn");
    const winnerCountEl = document.getElementById("winnerCount");
    const drawButton = document.getElementById("drawButton");
    const participantCountEl = document.getElementById("participantCount");
    const effectBox = document.getElementById("effectBox");
    const effectMessage = document.getElementById("effectMessage");
    const statusEl = document.getElementById("status");
    const bgm = document.getElementById("bgm");

    const drawOverlay = document.getElementById("drawOverlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayCount = document.getElementById("overlayCount");
    const overlaySubtext = document.getElementById("overlaySubtext");
    const particlesEl = document.getElementById("particles");

    const fireworksCanvas = document.getElementById("fireworksCanvas");
    const fwCtx = fireworksCanvas.getContext("2d");

    let isDrawing = false;
    let fireworks = [];
    let fireworkAnimationId = null;
    let fireworksRunning = false;
    let fireworksLauncherId = null;

    function parseNames(text) {
      const seen = new Set();

      return text
        .split(/[\n,，]+/)
        .map(name => name.trim())
        .filter(name => {
          if (!name) return false;

          const key = name.toLocaleLowerCase();

          if (seen.has(key)) return false;

          seen.add(key);
          return true;
        });
    }

    function updateParticipantCount() {
      participantCountEl.textContent =
        `目前 ${parseNames(participantsEl.value).length} 位有效參加者`;
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function shuffle(array) {
      const result = [...array];

      for (let i = result.length - 1; i > 0; i--) {
        const j = crypto.getRandomValues(new Uint32Array(1))[0] % (i + 1);
        [result[i], result[j]] = [result[j], result[i]];
      }

      return result;
    }

    async function copyText(text) {
      if (!text.trim()) {
        setStatus("沒有內容可複製。", "error");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        setStatus("已複製到剪貼簿。", "success");
      } catch {
        setStatus("無法自動複製，請手動選取文字後複製。", "error");
      }
    }

    async function pasteText(target) {
      try {
        target.value = await navigator.clipboard.readText();
        target.dispatchEvent(new Event("input"));
        setStatus("已從剪貼簿貼上。", "success");
      } catch {
        setStatus("瀏覽器未允許讀取剪貼簿，請在文字框內手動貼上。", "error");
      }
    }

    function clearText(target) {
      if (isDrawing) return;

      target.value = "";
      target.dispatchEvent(new Event("input"));

      setStatus(
        target === winnersEl || target === notDrawnEl
          ? "已清除抽獎結果。"
          : "已清除內容。",
        "success"
      );
    }

    function setDrawingState(drawing) {
      isDrawing = drawing;
      drawButton.disabled = drawing;
      winnerCountEl.disabled = drawing;

      document.querySelectorAll("[data-action]").forEach(button => {
        button.disabled = drawing;
      });
    }

    async function playBgm() {
      bgm.currentTime = 0;
      bgm.volume = 0.6;

      try {
        await bgm.play();
      } catch {
        setStatus("背景音樂無法播放，請確認音訊檔案存在或瀏覽器允許播放。", "error");
      }
    }

    function stopBgm() {
      bgm.pause();
      bgm.currentTime = 0;
    }

    function startEffect() {
      effectBox.classList.add("running");
      effectMessage.textContent = "正在抽獎";
      winnersEl.value = "";
      notDrawnEl.value = "";
      setStatus("抽獎進行中，結果即將一次過揭曉。");
    }

    function stopEffect() {
      effectBox.classList.remove("running");
      effectMessage.textContent = "抽獎完成";
    }

    function createParticles(total = 150) {
      particlesEl.innerHTML = "";

      for (let i = 0; i < total; i++) {
        const particle = document.createElement("i");
        particle.className = "particle";

        particle.style.setProperty("--angle", `${Math.random() * 360}deg`);
        particle.style.setProperty("--distance", `${35 + Math.random() * 80}vmax`);
        particle.style.setProperty("--size", `${5 + Math.random() * 14}px`);
        particle.style.setProperty("--hue", Math.floor(Math.random() * 360));
        particle.style.setProperty("--delay", `${-(Math.random() * 1.5)}s`);

        particlesEl.appendChild(particle);
      }
    }

    function animateOverlayNumber() {
      const sequence = [
        { number: "3", title: "命運正在集結", text: "準備召喚幸運力量" },
        { number: "2", title: "能量正在爆發", text: "請屏住呼吸" },
        { number: "1", title: "最後倒數", text: "幸運得主即將誕生" },
        { number: "✨", title: "結果揭曉", text: "恭喜所有得獎者！" }
      ];

      sequence.forEach((item, index) => {
        window.setTimeout(() => {
          overlayCount.classList.remove("pop");
          void overlayCount.offsetWidth;

          overlayTitle.textContent = item.title;
          overlaySubtext.textContent = item.text;
          overlayCount.textContent = item.number;
          overlayCount.classList.add("pop");

          if (item.number === "✨") {
            drawOverlay.classList.remove("drawing");
            drawOverlay.classList.add("reveal");
          }
        }, index * 820);
      });
    }

    function showOverlay() {
      createParticles(150);
      drawOverlay.className = "draw-overlay show drawing";
      drawOverlay.setAttribute("aria-hidden", "false");

      overlayTitle.textContent = "命運正在集結";
      overlaySubtext.textContent = "準備召喚幸運力量";
      overlayCount.textContent = "3";

      animateOverlayNumber();
    }

    function hideOverlay() {
      stopFireworks();
      drawOverlay.className = "draw-overlay";
      drawOverlay.setAttribute("aria-hidden", "true");
    }

    function resizeFireworksCanvas() {
      const ratio = window.devicePixelRatio || 1;

      fireworksCanvas.width = Math.floor(window.innerWidth * ratio);
      fireworksCanvas.height = Math.floor(window.innerHeight * ratio);
      fireworksCanvas.style.width = `${window.innerWidth}px`;
      fireworksCanvas.style.height = `${window.innerHeight}px`;

      fwCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createBurst(x, y, hue) {
      const count = 85;

      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = random(1.5, 7);

        fireworks.push({
          type: "spark",
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: random(45, 85),
          alpha: 1,
          radius: random(1.8, 3.8),
          hue: (hue + random(-35, 35) + 360) % 360,
          gravity: 0.045,
          decay: random(0.01, 0.02)
        });
      }
    }

    function launchFirework() {
      const startX = random(window.innerWidth * 0.15, window.innerWidth * 0.85);
      const startY = window.innerHeight + 20;
      const targetX = random(window.innerWidth * 0.15, window.innerWidth * 0.85);
      const targetY = random(window.innerHeight * 0.12, window.innerHeight * 0.45);
      const hue = Math.floor(random(0, 360));

      fireworks.push({
        type: "rocket",
        x: startX,
        y: startY,
        vx: (targetX - startX) / random(35, 55),
        vy: (targetY - startY) / random(35, 55),
        targetY,
        hue,
        trail: []
      });
    }

    function drawRocket(firework) {
      firework.trail.push({ x: firework.x, y: firework.y });

      if (firework.trail.length > 8) {
        firework.trail.shift();
      }

      if (firework.trail.length > 1) {
        fwCtx.beginPath();
        fwCtx.moveTo(firework.trail[0].x, firework.trail[0].y);

        firework.trail.forEach(point => {
          fwCtx.lineTo(point.x, point.y);
        });

        fwCtx.strokeStyle = `hsla(${firework.hue}, 100%, 65%, 0.62)`;
        fwCtx.lineWidth = 2;
        fwCtx.stroke();
      }

      fwCtx.beginPath();
      fwCtx.arc(firework.x, firework.y, 3, 0, Math.PI * 2);
      fwCtx.fillStyle = `hsl(${firework.hue}, 100%, 68%)`;
      fwCtx.shadowBlur = 16;
      fwCtx.shadowColor = `hsl(${firework.hue}, 100%, 62%)`;
      fwCtx.fill();
      fwCtx.shadowBlur = 0;
    }

    function drawSpark(firework) {
      fwCtx.beginPath();
      fwCtx.arc(firework.x, firework.y, firework.radius, 0, Math.PI * 2);
      fwCtx.fillStyle = `hsla(${firework.hue}, 100%, 64%, ${firework.alpha})`;
      fwCtx.shadowBlur = 13;
      fwCtx.shadowColor = `hsla(${firework.hue}, 100%, 58%, ${firework.alpha})`;
      fwCtx.fill();
      fwCtx.shadowBlur = 0;
    }

    function updateFireworks() {
      fwCtx.fillStyle = "rgba(3, 7, 20, 0.20)";
      fwCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      for (let i = fireworks.length - 1; i >= 0; i--) {
        const firework = fireworks[i];

        if (firework.type === "rocket") {
          firework.x += firework.vx;
          firework.y += firework.vy;

          drawRocket(firework);

          if (firework.y <= firework.targetY) {
            createBurst(firework.x, firework.y, firework.hue);
            fireworks.splice(i, 1);
          }

          continue;
        }

        firework.x += firework.vx;
        firework.y += firework.vy;
        firework.vy += firework.gravity;
        firework.alpha -= firework.decay;
        firework.life -= 1;

        drawSpark(firework);

        if (firework.life <= 0 || firework.alpha <= 0) {
          fireworks.splice(i, 1);
        }
      }

      if (fireworksRunning) {
        fireworkAnimationId = requestAnimationFrame(updateFireworks);
      }
    }

    function startFireworks(duration = 2600) {
      stopFireworks();
      resizeFireworksCanvas();

      fireworks = [];
      fireworksRunning = true;

      fwCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (let i = 0; i < 6; i++) {
        window.setTimeout(launchFirework, i * 150);
      }

      fireworksLauncherId = window.setInterval(() => {
        launchFirework();

        if (Math.random() > 0.45) {
          launchFirework();
        }
      }, 260);

      updateFireworks();

      window.setTimeout(stopFireworks, duration);
    }

    function stopFireworks() {
      fireworksRunning = false;

      if (fireworkAnimationId) {
        cancelAnimationFrame(fireworkAnimationId);
        fireworkAnimationId = null;
      }

      if (fireworksLauncherId) {
        clearInterval(fireworksLauncherId);
        fireworksLauncherId = null;
      }

      window.setTimeout(() => {
        fwCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        fireworks = [];
      }, 150);
    }

    function drawWinners() {
      if (isDrawing) return;

      const participants = parseNames(participantsEl.value);
      const winnerCount = Number.parseInt(winnerCountEl.value, 10);

      if (!participants.length) {
        setStatus("請先輸入至少一位參加者。", "error");
        participantsEl.focus();
        return;
      }

      if (!Number.isInteger(winnerCount) || winnerCount < 1) {
        setStatus("抽獎人數必須是大於 0 的整數。", "error");
        winnerCountEl.focus();
        return;
      }

      if (winnerCount > participants.length) {
        setStatus(`抽獎人數不可多於有效參加者人數（${participants.length} 位）。`, "error");
        winnerCountEl.focus();
        return;
      }

      const shuffledParticipants = shuffle(participants);
      const selectedWinners = shuffledParticipants.slice(0, winnerCount);
      const notDrawnNames = shuffledParticipants.slice(winnerCount);

      setDrawingState(true);
      startEffect();
      showOverlay();
      playBgm();

      window.setTimeout(() => {
        winnersEl.value = selectedWinners.join("\n");
        notDrawnEl.value = notDrawnNames.join("\n");

        stopEffect();

        overlayTitle.textContent = "抽獎完成";
        overlayCount.textContent = "🎊";
        overlaySubtext.textContent = `已一次過抽出 ${selectedWinners.length} 位得獎者`;

        startFireworks(2600);

        setStatus(
          `恭喜！已抽出 ${selectedWinners.length} 位得獎者，另有 ${notDrawnNames.length} 位未抽中。`,
          "success"
        );
      }, 3300);

      window.setTimeout(() => {
        stopFireworks();
        hideOverlay();
        stopBgm();
        setDrawingState(false);
      }, 6500);
    }

    participantsEl.addEventListener("input", updateParticipantCount);
    drawButton.addEventListener("click", drawWinners);

    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", async () => {
        const target = document.getElementById(button.dataset.target);
        const action = button.dataset.action;

        if (action === "copy") {
          await copyText(target.value);
        }

        if (action === "paste") {
          await pasteText(target);
        }

        if (action === "clear") {
          clearText(target);
        }
      });
    });

    window.addEventListener("resize", resizeFireworksCanvas);

    resizeFireworksCanvas();
    updateParticipantCount();
  </script>
</body>
</html>
