<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>snake-game</title>
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <style>
        :root,
        [data-theme="light"] {
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
            --color-bg: #f7f6f2;
            --color-surface: #f9f8f5;
            --color-surface-2: #fbfbf9;
            --color-surface-offset: #edeae5;
            --color-border: #d4d1ca;
            --color-text: #28251d;
            --color-text-muted: #6e6b64;
            --color-text-faint: #97938b;
            --color-primary: #01696f;
            --color-primary-hover: #0c4e54;
            --color-success: #437a22;
            --color-error: #a12c7b;
            --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
            --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
            --font-body: 'Satoshi', 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --color-bg: #171614;
            --color-surface: #1c1b19;
            --color-surface-2: #201f1d;
            --color-surface-offset: #262421;
            --color-border: #393836;
            --color-text: #e0ddd8;
            --color-text-muted: #aca79f;
            --color-text-faint: #7f7b75;
            --color-primary: #4f98a3;
            --color-primary-hover: #67aeb8;
            --color-success: #7dbc53;
            --color-error: #d163a7;
            --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
            --shadow-md: 0 6px 20px oklch(0 0 0 / 0.32);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100dvh;
            font-family: var(--font-body);
            font-size: var(--text-base);
            line-height: 1.5;
            color: var(--color-text);
            background:
                radial-gradient(circle at top, color-mix(in oklab, var(--color-primary) 18%, transparent), transparent 34%),
                var(--color-bg);
            display: flex;
            justify-content: center;
            padding: var(--space-4);
        }

        button,
        canvas {
            display: block;
        }

        button {
            border: none;
            font: inherit;
            color: inherit;
        }

        .app {
            width: min(100%, 820px);
            background: color-mix(in oklab, var(--color-surface) 92%, transparent);
            border: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            backdrop-filter: blur(16px);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4);
            border-bottom: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
            background: color-mix(in oklab, var(--color-surface-2) 88%, transparent);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .logo {
            width: 2.5rem;
            height: 2.5rem;
            color: var(--color-primary);
        }

        .brand h1 {
            font-size: var(--text-lg);
            line-height: 1.1;
        }

        .brand p {
            color: var(--color-text-muted);
            font-size: var(--text-sm);
        }

        .theme-toggle,
        .action-btn {
            min-width: 44px;
            min-height: 44px;
            border-radius: var(--radius-full);
            background: var(--color-surface-offset);
            cursor: pointer;
            transition: transform var(--transition-interactive), background var(--transition-interactive);
        }

        .theme-toggle:hover,
        .action-btn:hover {
            transform: translateY(-1px);
            background: color-mix(in oklab, var(--color-primary) 15%, var(--color-surface-offset));
        }

        .content {
            display: grid;
            gap: var(--space-4);
            padding: var(--space-4);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: var(--space-3);
        }

        .stat {
            background: var(--color-surface-2);
            border: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent);
            border-radius: var(--radius-lg);
            padding: var(--space-3);
        }

        .stat span {
            display: block;
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--color-text-muted);
        }

        .stat strong {
            display: block;
            font-size: var(--text-lg);
            margin-top: var(--space-1);
        }

        .game-shell {
            display: grid;
            gap: var(--space-4);
            grid-template-columns: minmax(0, 1fr) 240px;
            align-items: start;
        }

        .board-panel,
        .control-panel {
            background: var(--color-surface-2);
            border: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent);
            border-radius: var(--radius-xl);
            padding: var(--space-4);
        }

        canvas {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #0d1413;
            border-radius: calc(var(--radius-xl) - var(--space-4));
            border: 1px solid color-mix(in oklab, white 8%, transparent);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .03);
            touch-action: none;
        }

        .panel-title {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin-bottom: var(--space-3);
        }

        .help {
            color: var(--color-text-muted);
            font-size: var(--text-sm);
            margin-top: var(--space-3);
        }

        .actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-4);
        }

        .action-btn {
            flex: 1;
            border-radius: var(--radius-lg);
            background: var(--color-surface-offset);
        }

        .action-btn.primary {
            background: var(--color-primary);
            color: white;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-2);
            max-width: 220px;
            margin: 0 auto;
            user-select: none;
            -webkit-user-select: none;
        }

        .dpad button {
            min-height: 64px;
            border-radius: var(--radius-lg);
            background: color-mix(in oklab, var(--color-surface-offset) 88%, transparent);
            border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-interactive), background var(--transition-interactive);
            touch-action: manipulation;
        }

        .dpad button:active,
        .dpad button.active {
            transform: scale(.96);
            background: color-mix(in oklab, var(--color-primary) 25%, var(--color-surface-offset));
        }

        .dpad .empty {
            visibility: hidden;
            pointer-events: none;
        }

        .legend {
            display: grid;
            gap: var(--space-2);
            margin-top: var(--space-4);
            color: var(--color-text-muted);
            font-size: var(--text-sm);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: var(--radius-full);
        }

        .dot.snake {
            background: #5de2aa;
        }

        .dot.food {
            background: #ff8760;
        }

        .footer-note {
            padding: 0 var(--space-4) var(--space-4);
            color: var(--color-text-faint);
            font-size: var(--text-sm);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 760px) {
            body {
                padding: 0;
            }

            .app {
                min-height: 100dvh;
                border-radius: 0;
            }

            .topbar {
                position: sticky;
                top: 0;
                z-index: 10;
            }

            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .game-shell {
                grid-template-columns: 1fr;
            }

            .board-panel,
            .control-panel {
                padding: var(--space-3);
            }

            .dpad {
                max-width: none;
            }

            .dpad button {
                min-height: 72px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>

<body>
    <a class="sr-only" href="#main">跳到內容</a>
    <main class="app" id="main">
        <header class="topbar">
            <div class="brand">
                <svg class="logo" viewBox="0 0 64 64" fill="none" aria-label="Snake Game logo">
                    <rect x="8" y="8" width="48" height="48" rx="14" stroke="currentColor" stroke-width="4"></rect>
                    <path
                        d="M20 24C20 19.6 23.6 16 28 16H36C40.4 16 44 19.6 44 24C44 28.4 40.4 32 36 32H28C23.6 32 20 35.6 20 40C20 44.4 23.6 48 28 48H44"
                        stroke="currentColor" stroke-width="5" stroke-linecap="round"></path>
                    <circle cx="44" cy="48" r="3.5" fill="currentColor"></circle>
                </svg>
                <div>
                    <h1>貪食蛇</h1>
                    <p>支援鍵盤與虛擬上下左右鍵</p>
                </div>
            </div>
            <button class="theme-toggle" data-theme-toggle aria-label="切換主題">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <section class="content">
            <section class="stats" aria-label="遊戲狀態">
                <article class="stat"><span>分數</span><strong id="score">0</strong></article>
                <article class="stat"><span>最高分</span><strong id="best">0</strong></article>
                <article class="stat"><span>速度</span><strong id="speed">1x</strong></article>
                <article class="stat"><span>狀態</span><strong id="status">待開始</strong></article>
            </section>

            <section class="game-shell">
                <div class="board-panel">
                    <div class="panel-title">遊戲畫面</div>
                    <canvas id="board" width="480" height="480" aria-label="貪食蛇遊戲畫布"></canvas>
                    <div class="actions">
                        <button class="action-btn primary" id="startBtn">開始 / 重新開始</button>
                        <button class="action-btn" id="pauseBtn">暫停</button>
                    </div>
                    <p class="help">桌面可用方向鍵或 WASD；手機可直接按右側虛擬方向鍵。</p>
                </div>

                <aside class="control-panel">
                    <div class="panel-title">虛擬方向鍵</div>
                    <div class="dpad" aria-label="方向控制器">
                        <div class="empty"></div>
                        <button data-dir="up" aria-label="向上">↑</button>
                        <div class="empty"></div>
                        <button data-dir="left" aria-label="向左">←</button>
                        <button data-dir="down" aria-label="向下">↓</button>
                        <button data-dir="right" aria-label="向右">→</button>
                    </div>
                    <div class="legend">
                        <div class="legend-item"><span class="dot snake"></span><span>蛇身</span></div>
                        <div class="legend-item"><span class="dot food"></span><span>食物</span></div>
                    </div>
                    <p class="help">虛擬按鍵採用大按鈕設計，方便手機單手操作。</p>
                </aside>
            </section>
        </section>

        <p class="footer-note">規則：撞牆或撞到自己即結束，吃到食物會加分並稍微加速。</p>
    </main>

    <script>
        (() => {
            const root = document.documentElement;
            const toggle = document.querySelector('[data-theme-toggle]');
            let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            root.setAttribute('data-theme', theme);
            const renderToggle = () => {
                toggle.innerHTML = theme === 'dark'
                    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
                    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
            };
            renderToggle();
            toggle.addEventListener('click', () => {
                theme = theme === 'dark' ? 'light' : 'dark';
                root.setAttribute('data-theme', theme);
                renderToggle();
            });
        })();

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const speedEl = document.getElementById('speed');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const dpadButtons = [...document.querySelectorAll('[data-dir]')];

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [];
        let food = { x: 10, y: 10 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let best = 0;
        let running = false;
        let paused = false;
        let gameLoop = null;
        let moveDelay = 160;

        function resetGame() {
            snake = [
                { x: 6, y: 12 },
                { x: 5, y: 12 },
                { x: 4, y: 12 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            moveDelay = 160;
            paused = false;
            running = true;
            updateFood();
            updateStats();
            restartLoop();
            draw();
        }

        function restartLoop() {
            clearInterval(gameLoop);
            gameLoop = setInterval(step, moveDelay);
        }

        function updateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(part => part.x === food.x && part.y === food.y));
        }

        function setDirection(dir) {
            const map = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };
            const next = map[dir];
            if (!next) return;
            if (next.x === -direction.x && next.y === -direction.y) return;
            nextDirection = next;
            activateButton(dir);
            if (!running) {
                resetGame();
            }
        }

        function activateButton(dir) {
            dpadButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.dir === dir));
            setTimeout(() => dpadButtons.forEach(btn => btn.classList.remove('active')), 90);
        }

        function step() {
            if (!running || paused) return;
            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount || snake.some(part => part.x === head.x && part.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 1;
                best = Math.max(best, score);
                moveDelay = Math.max(70, moveDelay - 6);
                updateFood();
                restartLoop();
            } else {
                snake.pop();
            }

            updateStats();
            draw();
        }

        function endGame() {
            running = false;
            paused = false;
            clearInterval(gameLoop);
            updateStats('遊戲結束');
            draw(true);
        }

        function updateStats(customStatus) {
            scoreEl.textContent = score;
            bestEl.textContent = best;
            speedEl.textContent = `${(160 / moveDelay).toFixed(1)}x`;
            statusEl.textContent = customStatus || (paused ? '已暫停' : running ? '進行中' : '待開始');
            pauseBtn.textContent = paused ? '繼續' : '暫停';
        }

        function draw(gameOver = false) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0d1413';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                const offset = i * gridSize;
                ctx.beginPath();
                ctx.moveTo(offset, 0);
                ctx.lineTo(offset, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, offset);
                ctx.lineTo(canvas.width, offset);
                ctx.stroke();
            }

            const foodX = food.x * gridSize + gridSize / 2;
            const foodY = food.y * gridSize + gridSize / 2;
            ctx.fillStyle = '#ff8760';
            ctx.beginPath();
            ctx.arc(foodX, foodY, gridSize * 0.34, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach((part, index) => {
                const x = part.x * gridSize;
                const y = part.y * gridSize;
                ctx.fillStyle = index === 0 ? '#8bf3c7' : '#5de2aa';
                roundRect(ctx, x + 1.5, y + 1.5, gridSize - 3, gridSize - 3, 6);
                ctx.fill();
            });

            if (!running || paused || gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.42)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f3f4ee';
                ctx.textAlign = 'center';
                ctx.font = '700 28px Satoshi, sans-serif';
                const title = gameOver ? '遊戲結束' : paused ? '已暫停' : '按開始遊玩';
                ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 10);
                ctx.font = '500 16px Satoshi, sans-serif';
                ctx.fillStyle = 'rgba(243,244,238,0.8)';
                const subtitle = gameOver ? '按「開始 / 重新開始」再玩一次' : '可用鍵盤或虛擬方向鍵控制';
                ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 22);
            }
        }

        function roundRect(context, x, y, width, height, radius) {
            context.beginPath();
            context.moveTo(x + radius, y);
            context.arcTo(x + width, y, x + width, y + height, radius);
            context.arcTo(x + width, y + height, x, y + height, radius);
            context.arcTo(x, y + height, x, y, radius);
            context.arcTo(x, y, x + width, y, radius);
            context.closePath();
        }

        document.addEventListener('keydown', (event) => {
            const keyMap = {
                ArrowUp: 'up', w: 'up', W: 'up',
                ArrowDown: 'down', s: 'down', S: 'down',
                ArrowLeft: 'left', a: 'left', A: 'left',
                ArrowRight: 'right', d: 'right', D: 'right'
            };
            const dir = keyMap[event.key];
            if (dir) {
                event.preventDefault();
                setDirection(dir);
            }
            if (event.key === ' ') {
                event.preventDefault();
                handlePause();
            }
        }, { passive: false });

        dpadButtons.forEach(button => {
            const handler = (event) => {
                event.preventDefault();
                setDirection(button.dataset.dir);
            };
            button.addEventListener('pointerdown', handler, { passive: false });
            button.addEventListener('click', handler, { passive: false });
        });

        function handlePause() {
            if (!running) return;
            paused = !paused;
            updateStats();
            draw();
        }

        startBtn.addEventListener('click', resetGame);
        pauseBtn.addEventListener('click', handlePause);

        updateStats();
        draw();
    </script>


</body>


</html>
