<!doctype html>
<html lang="zh-Hant" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圍棋教學示範棋盤</title>
    <style>
        :root,
        [data-theme="light"] {
            --bg: #f7f6f2;
            --surface: #fbfaf7;
            --surface2: #f2efe8;
            --text: #26231c;
            --muted: #706b62;
            --border: #d7d2c8;
            --primary: #01696f;
            --primary-hover: #0d5257;
            --wood1: #d8b06f;
            --wood2: #c79c5a;
            --line: #6c4d24;
            --free: #b45000;
            --shadow: 0 8px 24px rgba(0, 0, 0, .08);
            --radius: 16px;
        }

        [data-theme="dark"] {
            --bg: #171614;
            --surface: #1d1c1a;
            --surface2: #262420;
            --text: #e5e2dc;
            --muted: #a49f95;
            --border: #3c3933;
            --primary: #4f98a3;
            --primary-hover: #67adb6;
            --wood1: #8b6a3b;
            --wood2: #6e5127;
            --line: #e3cc9a;
            --free: #ff9b54;
            --shadow: 0 10px 28px rgba(0, 0, 0, .28);
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Arial, "Noto Sans TC", "PingFang TC", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        button,
        input,
        select {
            font: inherit
        }

        button {
            cursor: pointer
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0
        }

        .app {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 400px;
            gap: 16px;
            height: 100vh;
            padding: 0;
            overflow: hidden;
            align-items: start;
        }

        .panel,
        .board-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .board-panel {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            border-radius: 0;
        }

        .panel {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 0;
        }

        .board-wrap {
            position: relative;
            width: min(92vmin, 920px);
            height: min(92vmin, 920px);
            aspect-ratio: 1/1;
            margin: 0;
            flex: 0 0 auto;
        }

        .board-bg {
            position: absolute;
            inset: 0;
            border-radius: 0;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, .16), transparent 35%),
                repeating-linear-gradient(0deg, transparent 0 31px, rgba(255, 255, 255, .03) 31px 32px),
                linear-gradient(135deg, var(--wood1), var(--wood2))
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none
        }

        .overlay {
            position: absolute;
            left: 14px;
            bottom: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(20, 20, 20, .72);
            color: #fff;
            font-size: 14px
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px
        }

        h1 {
            margin: 0;
            font-size: 28px
        }

        h2 {
            margin: 0 0 6px;
            font-size: 20px
        }

        .muted,
        .hint {
            color: var(--muted);
            font-size: 14px
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .controls,
        .segment,
        .playback {
            display: flex;
            flex-wrap: wrap;
            gap: 8px
        }

        .btn {
            min-height: 40px;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text)
        }

        .btn:hover {
            filter: brightness(.98)
        }

        .btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff
        }

        .btn.primary:hover {
            background: var(--primary-hover)
        }

        .btn.active {
            outline: 2px solid var(--primary);
            outline-offset: 2px
        }

        .btn.free-active {
            outline: 2px solid var(--free);
            outline-offset: 2px
        }

        .btn.small {
            min-height: 30px;
            padding: 4px 8px;
            font-size: 12px
        }

        label {
            font-size: 14px;
            font-weight: 700
        }

        select,
        input[type="text"] {
            width: 100%;
            min-height: 42px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            padding: 0 12px;
            color: var(--text)
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px
        }

        .stat {
            padding: 12px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border)
        }

        .stat strong {
            display: block;
            font-size: 24px
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 14px;
            color: var(--muted)
        }

        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle
        }

        .moves {
            max-height: none;
            overflow: visible;
            border-top: 1px solid var(--border);
            padding-top: 10px
        }

        .moves ol {
            margin: 0;
            padding-left: 20px;
            font-size: 14px
        }

        .moves li {
            margin: 8px 0;
            color: var(--muted)
        }

        .move-row {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .move-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px
        }

        .range-wrap {
            display: grid;
            gap: 8px
        }

        input[type="range"] {
            width: 100%
        }

        .editor {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 50
        }

        .editor.show {
            display: flex
        }

        .editor-card {
            width: min(460px, 100%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 18px;
            display: grid;
            gap: 12px
        }

        .editor-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end
        }

        @media (max-width:980px) {

            html,
            body {
                overflow: auto
            }

            .app {
                grid-template-columns: 1fr;
                height: auto;
            }

            .board-panel {
                height: auto;
                overflow: auto;
            }

            .panel {
                height: auto;
                overflow: visible;
            }

            .board-wrap {
                width: min(96vw, 760px);
                height: min(96vw, 760px);
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <main class="board-panel">
            <div class="board-wrap">
                <div class="board-bg"></div>
                <canvas id="board" width="1000" height="1000" aria-label="圍棋棋盤"></canvas>
                <div class="overlay" id="statusText">黑方行棋</div>
            </div>
        </main>

        <aside class="panel" tabindex="0" role="region" aria-label="功能區">
            <div class="topbar">
                <div>
                    <h1>圍棋教學示範棋盤</h1>
                    <div class="muted">固定棋盤 + 右欄獨立滾動 + 1 起始座標 + 順序手順</div>
                </div>
                <button class="btn" id="themeBtn" aria-label="切換深淺色">◐</button>
            </div>

            <section>
                <div class="row">
                    <div>
                        <label for="sizeSelect">棋盤大小</label>
                        <select id="sizeSelect">
                            <option value="9">9 路</option>
                            <option value="13">13 路</option>
                            <option value="19" selected>19 路</option>
                        </select>
                    </div>
                    <div>
                        <label for="toolSelect">目前工具</label>
                        <select id="toolSelect">
                            <option value="play">落子</option>
                            <option value="label">標記文字</option>
                            <option value="erase">擦除</option>
                        </select>
                    </div>
                </div>
            </section>

            <section>
                <div class="segment" id="stoneChooser">
                    <button class="btn active" data-color="black">黑先</button>
                    <button class="btn" data-color="white">白先</button>
                </div>
            </section>

            <section>
                <label for="customLabel">自訂標記文字</label>
                <input id="customLabel" type="text" placeholder="例如：斷點、厚勢、先手">
            </section>

            <section class="controls">
                <button class="btn primary" id="passBtn">虛手</button>
                <button class="btn" id="undoBtn">悔棋</button>
                <button class="btn" id="clearBtn">清空棋盤</button>
                <button class="btn" id="scoreBtn">重新計目</button>
            </section>

            <section>
                <h2>即時計目</h2>
                <div class="stats">
                    <div class="stat"><span class="muted">黑子數</span><strong id="blackStones">0</strong></div>
                    <div class="stat"><span class="muted">白子數</span><strong id="whiteStones">0</strong></div>
                    <div class="stat"><span class="muted">黑地</span><strong id="blackTerritory">0</strong></div>
                    <div class="stat"><span class="muted">白地</span><strong id="whiteTerritory">0</strong></div>
                    <div class="stat"><span class="muted">中立點</span><strong id="neutralPoints">0</strong></div>
                    <div class="stat"><span class="muted">形勢</span><strong id="scoreLead">平手</strong></div>
                </div>
                <p class="hint">計目為教學估算，不含貼目與死活終局判定。</p>
            </section>

            <section>
                <h2>提子統計</h2>
                <div class="stats">
                    <div class="stat"><span class="muted">黑提子</span><strong id="blackCaptures">0</strong></div>
                    <div class="stat"><span class="muted">白提子</span><strong id="whiteCaptures">0</strong></div>
                </div>
                <p class="hint" id="modeText">一般示範模式，可自由落子與標記。</p>
            </section>

            <section>
                <h2>手順播放</h2>
                <div class="playback">
                    <button class="btn" id="prevStepBtn">上一步</button>
                    <button class="btn" id="playBtn">播放</button>
                    <button class="btn" id="nextStepBtn">下一步</button>
                </div>
                <div class="range-wrap" style="margin-top:10px">
                    <label for="timeline">手順時間軸</label>
                    <input id="timeline" type="range" min="0" max="0" value="0">
                    <div class="hint" id="timelineText">目前顯示：第 0 手 / 共 0 手</div>
                </div>
            </section>

            <section class="controls" id="extraTools">
                <button class="btn" id="exportBtn">匯出 PNG</button>
                <button class="btn" id="saveSgfBtn">匯出 SGF</button>
                <button class="btn" id="loadSgfBtn">載入 SGF</button>
                <button class="btn" id="saveJsonBtn">匯出 JSON</button>
                <button class="btn" id="loadJsonBtn">載入 JSON</button>
                <button class="btn" id="setupModeBtn">關手順擺盤</button>
                <button class="btn" id="setupAutoBtn">擺盤自動</button>
                <button class="btn" id="setupManualBtn">擺盤手動</button>
                <button class="btn" id="freeModeBtn">自由模式</button>
                <input class="sr-only" id="sgfInput" type="file" accept=".sgf,text/plain">
                <input class="sr-only" id="jsonInput" type="file" accept=".json,application/json">
            </section>

            <section>
                <h2>圖例</h2>
                <div class="legend">
                    <span><i class="dot" style="background:#111"></i>正式黑子</span>
                    <span><i class="dot" style="background:#f5f5f5;border:1px solid #999"></i>正式白子</span>
                    <span><i class="dot" style="background:#01696f"></i>正式標記</span>
                    <span><i class="dot" style="background:#b45000"></i>自由標記/自由棋子</span>
                </div>
            </section>

            <section class="moves">
                <h2>手順記錄</h2>
                <ol id="moveList"></ol>
            </section>
        </aside>
    </div>

    <div class="editor" id="moveEditor">
        <div class="editor-card">
            <h2>編輯手順</h2>
            <div class="row">
                <div>
                    <label for="editType">類型</label>
                    <select id="editType">
                        <option value="play">落子</option>
                        <option value="pass">虛手</option>
                    </select>
                </div>
                <div>
                    <label for="editColor">顏色</label>
                    <select id="editColor">
                        <option value="black">黑</option>
                        <option value="white">白</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div>
                    <label for="editX">X 座標</label>
                    <input id="editX" type="text" placeholder="1">
                </div>
                <div>
                    <label for="editY">Y 座標</label>
                    <input id="editY" type="text" placeholder="1">
                </div>
            </div>
            <div class="hint">座標以 1 開始，例如左上角是 1,1；虛手可不用填 X/Y。</div>
            <div class="editor-actions">
                <button class="btn" id="cancelEditBtn">取消</button>
                <button class="btn primary" id="saveEditBtn">儲存</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const sizeSelect = document.getElementById('sizeSelect');
        const toolSelect = document.getElementById('toolSelect');
        const customLabel = document.getElementById('customLabel');
        const statusText = document.getElementById('statusText');
        const moveList = document.getElementById('moveList');
        const moveEditor = document.getElementById('moveEditor');
        const editType = document.getElementById('editType');
        const editColor = document.getElementById('editColor');
        const editX = document.getElementById('editX');
        const editY = document.getElementById('editY');

        const state = {
            size: 19,
            current: 'black',
            board: [],
            freeBoard: [],
            labels: new Map(),
            freeLabels: new Map(),
            moves: [],
            captureLog: [],
            replayMeta: { version: '1.0', steps: [] },
            margin: 70,
            cell: 0,
            starPoints: [],
            captures: { black: 0, white: 0 },
            setupMode: false,
            setupPlacement: 'auto',
            freeMode: false,
            viewStep: null,
            autoplay: false,
            autoplayTimer: null,
            baseState: null,
            editingMoveNo: null
        };

        function key(x, y) { return `${x},${y}`; }
        function parseKey(k) { return k.split(',').map(Number); }
        function cloneBoard(board) { return board.map(row => row.slice()); }

        function updateStarPoints() {
            const stars = { 19: [3, 9, 15], 13: [3, 6, 9], 9: [2, 4, 6] };
            const pts = stars[state.size] || [];
            state.starPoints = [];
            pts.forEach(y => pts.forEach(x => state.starPoints.push([x, y])));
        }

        function neighbors(x, y) {
            return [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]]
                .filter(([nx, ny]) => nx >= 0 && ny >= 0 && nx < state.size && ny < state.size);
        }

        function moveCount() {
            return state.moves.filter(m => m.type === 'play' || m.type === 'pass').length;
        }

        function stopAutoplay(silent = false) {
            state.autoplay = false;
            if (state.autoplayTimer) clearInterval(state.autoplayTimer);
            state.autoplayTimer = null;
            if (!silent) updateTimeline();
        }

        function resetBoard(size = state.size) {
            state.size = Number(size);
            state.board = Array.from({ length: state.size }, () => Array(state.size).fill(null));
            state.freeBoard = Array.from({ length: state.size }, () => Array(state.size).fill(null));
            state.labels = new Map();
            state.freeLabels = new Map();
            state.moves = [];
            state.captureLog = [];
            state.replayMeta = { version: '1.0', steps: [] };
            state.current = 'black';
            state.captures = { black: 0, white: 0 };
            state.setupMode = false;
            state.setupPlacement = 'auto';
            state.freeMode = false;
            state.viewStep = null;
            stopAutoplay(true);
            updateStarPoints();
            syncUI();
            draw();
        }

        function snapshotBaseState() {
            state.baseState = {
                size: state.size,
                current: state.current,
                board: cloneBoard(state.board),
                labels: [...state.labels.entries()],
                moves: state.moves.map(v => ({ ...v })),
                captureLog: state.captureLog.map(v => ({ ...v, captures: (v.captures || []).map(([x, y]) => [x, y]) })),
                replayMeta: JSON.parse(JSON.stringify(state.replayMeta)),
                captures: { ...state.captures },
                setupMode: state.setupMode,
                setupPlacement: state.setupPlacement
            };
        }

        function restoreBaseState() {
            if (!state.baseState) return;
            const b = state.baseState;
            state.size = b.size;
            state.current = b.current;
            state.board = cloneBoard(b.board);
            state.freeBoard = Array.from({ length: b.size }, () => Array(b.size).fill(null));
            state.labels = new Map(b.labels);
            state.freeLabels = new Map();
            state.moves = b.moves.map(v => ({ ...v }));
            state.captureLog = b.captureLog.map(v => ({ ...v, captures: (v.captures || []).map(([x, y]) => [x, y]) }));
            state.replayMeta = JSON.parse(JSON.stringify(b.replayMeta || { version: '1.0', steps: [] }));
            state.captures = { ...b.captures };
            state.setupMode = !!b.setupMode;
            state.setupPlacement = b.setupPlacement || 'auto';
            state.freeMode = false;
            updateStarPoints();
        }

        function groupAt(board, x, y) {
            const color = board[y][x];
            if (!color) return null;
            const stones = [];
            const liberties = new Set();
            const seen = new Set([key(x, y)]);
            const queue = [[x, y]];
            while (queue.length) {
                const [cx, cy] = queue.pop();
                stones.push([cx, cy]);
                neighbors(cx, cy).forEach(([nx, ny]) => {
                    const v = board[ny][nx];
                    if (v === color && !seen.has(key(nx, ny))) {
                        seen.add(key(nx, ny));
                        queue.push([nx, ny]);
                    } else if (!v) {
                        liberties.add(key(nx, ny));
                    }
                });
            }
            return { color, stones, liberties };
        }

        function findCapturedGroups(board, colorJustPlayed, x, y) {
            const enemy = colorJustPlayed === 'black' ? 'white' : 'black';
            const groups = [];
            const seen = new Set();
            neighbors(x, y).forEach(([nx, ny]) => {
                if (board[ny][nx] !== enemy) return;
                const k = key(nx, ny);
                if (seen.has(k)) return;
                const grp = groupAt(board, nx, ny);
                if (!grp) return;
                grp.stones.forEach(([sx, sy]) => seen.add(key(sx, sy)));
                if (grp.liberties.size === 0) groups.push(grp.stones.map(([sx, sy]) => [sx, sy]));
            });
            return groups;
        }

        function removeCaptured(board, colorJustPlayed, x, y) {
            let removed = 0;
            const groups = findCapturedGroups(board, colorJustPlayed, x, y);
            groups.forEach(stones => {
                stones.forEach(([sx, sy]) => {
                    board[sy][sx] = null;
                    removed++;
                });
            });
            return { removed, groups };
        }

        function isLegalMoveOnBoard(board, x, y, color) {
            if (board[y][x]) return false;
            const test = cloneBoard(board);
            test[y][x] = color;
            removeCaptured(test, color, x, y);
            const grp = groupAt(test, x, y);
            return grp && grp.liberties.size > 0;
        }

        function recordReplayStep(step) {
            state.replayMeta.steps.push(JSON.parse(JSON.stringify(step)));
        }

        function isPlayableStep(step) {
            return step.type === 'play' || step.type === 'pass';
        }

        function renumberPlayableSteps() {
            let n = 1;
            state.replayMeta.steps.forEach(step => {
                if (isPlayableStep(step)) step.moveNo = n++;
            });
        }

        function rebuildBoardFromReplaySteps(steps) {
            const board = Array.from({ length: state.size }, () => Array(state.size).fill(null));
            const labels = new Map();
            let current = 'black';
            let captures = { black: 0, white: 0 };

            steps.forEach(step => {
                if (step.type === 'setup') {
                    board[step.y][step.x] = step.color;
                    current = step.color === 'black' ? 'white' : 'black';
                } else if (step.type === 'play') {
                    if (step.x >= 0 && step.y >= 0 && step.x < state.size && step.y < state.size) {
                        board[step.y][step.x] = step.color;
                        const result = removeCaptured(board, step.color, step.x, step.y);
                        step.captures = result.groups.flat().map(([x, y]) => [x, y]);
                        if (result.removed) captures[step.color] += result.removed;
                    } else {
                        step.captures = [];
                    }
                    current = step.color === 'black' ? 'white' : 'black';
                } else if (step.type === 'pass') {
                    current = step.color === 'black' ? 'white' : 'black';
                } else if (step.type === 'label') {
                    labels.set(key(step.x, step.y), step.text);
                } else if (step.type === 'erase') {
                    board[step.y][step.x] = null;
                    labels.delete(key(step.x, step.y));
                }
            });

            return { board, labels, current, captures };
        }

        function rebuildAllFromReplayMeta() {
            renumberPlayableSteps();
            const rebuilt = rebuildBoardFromReplaySteps(state.replayMeta.steps);

            state.board = rebuilt.board;
            state.labels = rebuilt.labels;
            state.current = rebuilt.current;
            state.captures = rebuilt.captures;
            state.freeBoard = Array.from({ length: state.size }, () => Array(state.size).fill(null));
            state.freeLabels = new Map();
            state.moves = [];
            state.captureLog = [];

            state.replayMeta.steps.forEach(step => {
                if (step.type === 'setup') {
                    state.moves.push({ type: 'setup', x: step.x, y: step.y, color: step.color });
                } else if (step.type === 'play') {
                    const captured = (step.captures || []).length;
                    state.moves.push({ type: 'play', x: step.x, y: step.y, color: step.color, moveNo: step.moveNo, captured });
                    if (captured) {
                        state.captureLog.push({ moveNo: step.moveNo, by: step.color, captures: (step.captures || []).map(([x, y]) => [x, y]) });
                    }
                } else if (step.type === 'pass') {
                    state.moves.push({ type: 'pass', color: step.color, moveNo: step.moveNo });
                } else if (step.type === 'label') {
                    state.moves.push({ type: 'label', x: step.x, y: step.y, text: step.text });
                } else if (step.type === 'erase') {
                    state.moves.push({ type: 'erase', x: step.x, y: step.y });
                }
            });

            snapshotBaseState();
            state.viewStep = null;
            syncUI();
            draw();
        }

        function placeStone(x, y) {
            state.baseState = null;

            if (state.freeMode) {
                if (state.freeBoard[y][x] || state.board[y][x]) return;
                state.freeBoard[y][x] = state.current;
                if (state.setupPlacement === 'auto') state.current = state.current === 'black' ? 'white' : 'black';
                syncUI();
                draw();
                return;
            }

            if (state.board[y][x]) return;

            if (state.setupMode) {
                const setupColor = state.current;
                state.board[y][x] = setupColor;
                state.moves.push({ type: 'setup', x, y, color: setupColor });
                recordReplayStep({ type: 'setup', x, y, color: setupColor });
                if (state.setupPlacement === 'auto') state.current = state.current === 'black' ? 'white' : 'black';
                syncUI();
                draw();
                return;
            }

            if (!isLegalMoveOnBoard(state.board, x, y, state.current)) return;

            state.board[y][x] = state.current;
            const moveNo = moveCount() + 1;
            const result = removeCaptured(state.board, state.current, x, y);

            if (result.removed) {
                state.captures[state.current] += result.removed;
                state.captureLog.push({ moveNo, by: state.current, captures: result.groups.flat().map(([sx, sy]) => [sx, sy]) });
            }

            state.moves.push({ type: 'play', x, y, color: state.current, moveNo, captured: result.removed });
            recordReplayStep({ type: 'play', moveNo, x, y, color: state.current, captures: result.groups.flat().map(([sx, sy]) => [sx, sy]) });

            state.current = state.current === 'black' ? 'white' : 'black';
            syncUI();
            draw();
        }

        function addLabel(x, y, text) {
            if (!text) return;
            state.baseState = null;

            if (state.freeMode) {
                state.freeLabels.set(key(x, y), text.slice(0, 8));
                syncUI();
                draw();
                return;
            }

            state.labels.set(key(x, y), text.slice(0, 8));
            state.moves.push({ type: 'label', x, y, text: text.slice(0, 8) });
            recordReplayStep({ type: 'label', x, y, text: text.slice(0, 8) });
            syncUI();
            draw();
        }

        function eraseAt(x, y) {
            const k = key(x, y);

            if (state.freeMode) {
                state.freeBoard[y][x] = null;
                state.freeLabels.delete(k);
                syncUI();
                draw();
                return;
            }

            state.baseState = null;
            state.board[y][x] = null;
            state.labels.delete(k);
            state.moves.push({ type: 'erase', x, y });
            recordReplayStep({ type: 'erase', x, y });
            syncUI();
            draw();
        }

        function territoryEstimate() {
            const visited = new Set();
            let blackStones = 0, whiteStones = 0, blackTerritory = 0, whiteTerritory = 0, neutral = 0;
            for (let y = 0; y < state.size; y++) {
                for (let x = 0; x < state.size; x++) {
                    const v = state.board[y][x];
                    const fv = state.freeBoard[y]?.[x];
                    if (v === 'black' || fv === 'black') blackStones++;
                    if (v === 'white' || fv === 'white') whiteStones++;
                    if (v || fv || visited.has(key(x, y))) continue;
                    const queue = [[x, y]];
                    const empties = [];
                    const touches = new Set();
                    visited.add(key(x, y));
                    while (queue.length) {
                        const [cx, cy] = queue.pop();
                        empties.push([cx, cy]);
                        neighbors(cx, cy).forEach(([nx, ny]) => {
                            const nv = state.board[ny][nx] || state.freeBoard[ny][nx];
                            if (!nv && !visited.has(key(nx, ny))) {
                                visited.add(key(nx, ny));
                                queue.push([nx, ny]);
                            } else if (nv) {
                                touches.add(nv);
                            }
                        });
                    }
                    if (touches.size === 1 && touches.has('black')) blackTerritory += empties.length;
                    else if (touches.size === 1 && touches.has('white')) whiteTerritory += empties.length;
                    else neutral += empties.length;
                }
            }
            return { blackStones, whiteStones, blackTerritory, whiteTerritory, neutral };
        }

        function getPlayableMoves() {
            return state.moves.filter(m => m.type === 'play' || m.type === 'pass');
        }

        function rebuildToStep(step) {
            if (!state.baseState) snapshotBaseState();
            restoreBaseState();

            const setupSteps = state.baseState.replayMeta.steps.filter(s => !isPlayableStep(s));
            const playSteps = state.baseState.replayMeta.steps.filter(s => isPlayableStep(s));
            const merged = [...setupSteps, ...playSteps.slice(0, step)];
            const rebuilt = rebuildBoardFromReplaySteps(JSON.parse(JSON.stringify(merged)));

            state.board = rebuilt.board;
            state.labels = rebuilt.labels;
            state.current = rebuilt.current;
            state.captures = rebuilt.captures;
            state.freeBoard = Array.from({ length: state.size }, () => Array(state.size).fill(null));
            state.freeLabels = new Map();
            state.moves = [];
            state.captureLog = [];

            merged.forEach(s => {
                if (s.type === 'setup') state.moves.push({ type: 'setup', x: s.x, y: s.y, color: s.color });
                if (s.type === 'play') {
                    const captured = (s.captures || []).length;
                    state.moves.push({ type: 'play', x: s.x, y: s.y, color: s.color, moveNo: s.moveNo, captured });
                    if (captured) state.captureLog.push({ moveNo: s.moveNo, by: s.color, captures: s.captures.map(([x, y]) => [x, y]) });
                }
                if (s.type === 'pass') state.moves.push({ type: 'pass', color: s.color, moveNo: s.moveNo });
            });

            setupSteps.forEach(s => {
                if (s.type === 'label') state.moves.push({ type: 'label', x: s.x, y: s.y, text: s.text });
                if (s.type === 'erase') state.moves.push({ type: 'erase', x: s.x, y: s.y });
            });

            syncUI();
            draw();
        }

        function updateTimeline() {
            const total = state.baseState
                ? state.baseState.replayMeta.steps.filter(s => isPlayableStep(s)).length
                : getPlayableMoves().length;
            const tl = document.getElementById('timeline');
            const displayStep = state.viewStep == null ? total : state.viewStep;
            tl.max = String(total);
            tl.value = String(Math.min(displayStep, total));
            document.getElementById('timelineText').textContent = `目前顯示：第 ${Math.min(displayStep, total)} 手 / 共 ${total} 手`;
            document.getElementById('playBtn').textContent = state.autoplay ? '暫停' : '播放';
        }

        function setViewStep(step) {
            if (!state.baseState) snapshotBaseState();
            const total = state.baseState.replayMeta.steps.filter(s => isPlayableStep(s)).length;
            const s = Math.max(0, Math.min(total, step));
            state.viewStep = s;
            rebuildToStep(s);
            updateTimeline();
        }

        function startAutoplay() {
            if (!state.baseState) snapshotBaseState();
            const total = state.baseState.replayMeta.steps.filter(s => isPlayableStep(s)).length;
            if ((state.viewStep ?? total) >= total) state.viewStep = 0;
            state.autoplay = true;
            updateTimeline();
            state.autoplayTimer = setInterval(() => {
                const cur = state.viewStep ?? total;
                if (cur >= total) {
                    stopAutoplay();
                    return;
                }
                setViewStep(cur + 1);
            }, 850);
        }

        function getPlayableIndexes() {
            return state.replayMeta.steps
                .map((step, index) => ({ step, index }))
                .filter(({ step }) => isPlayableStep(step));
        }

        function movePlayableStep(direction, moveNo) {
            const playable = getPlayableIndexes();
            const pos = playable.findIndex(v => v.step.moveNo === moveNo);
            if (pos === -1) return;
            const swapPos = direction === 'up' ? pos - 1 : pos + 1;
            if (swapPos < 0 || swapPos >= playable.length) return;
            const a = playable[pos].index;
            const b = playable[swapPos].index;
            [state.replayMeta.steps[a], state.replayMeta.steps[b]] = [state.replayMeta.steps[b], state.replayMeta.steps[a]];
            rebuildAllFromReplayMeta();
        }

        function deletePlayableStep(moveNo) {
            const idx = state.replayMeta.steps.findIndex(step => isPlayableStep(step) && step.moveNo === moveNo);
            if (idx === -1) return;
            state.replayMeta.steps.splice(idx, 1);
            rebuildAllFromReplayMeta();
        }

        function openEditPlayableStep(moveNo) {
            const step = state.replayMeta.steps.find(s => isPlayableStep(s) && s.moveNo === moveNo);
            if (!step) return;
            state.editingMoveNo = moveNo;
            editType.value = step.type;
            editColor.value = step.color;
            editX.value = step.type === 'play' ? String(step.x + 1) : '';
            editY.value = step.type === 'play' ? String(step.y + 1) : '';
            editX.disabled = step.type === 'pass';
            editY.disabled = step.type === 'pass';
            moveEditor.classList.add('show');
        }

        function saveEditPlayableStep() {
            const step = state.replayMeta.steps.find(s => isPlayableStep(s) && s.moveNo === state.editingMoveNo);
            if (!step) return;
            const type = editType.value;
            const color = editColor.value;

            if (type === 'pass') {
                step.type = 'pass';
                step.color = color;
                delete step.x;
                delete step.y;
                delete step.captures;
            } else {
                const x1 = Number(editX.value);
                const y1 = Number(editY.value);
                const x = x1 - 1;
                const y = y1 - 1;

                if (Number.isNaN(x1) || Number.isNaN(y1) || x1 < 1 || y1 < 1 || x1 > state.size || y1 > state.size) {
                    alert('座標無效');
                    return;
                }

                step.type = 'play';
                step.color = color;
                step.x = x;
                step.y = y;
                step.captures = [];
            }

            moveEditor.classList.remove('show');
            state.editingMoveNo = null;
            rebuildAllFromReplayMeta();
        }

        function renderMoves() {
            moveList.innerHTML = '';

            state.moves.forEach(item => {
                const li = document.createElement('li');

                if (item.type === 'play' || item.type === 'pass') {
                    const wrap = document.createElement('div');
                    wrap.className = 'move-row';

                    const text = document.createElement('div');
                    text.textContent = item.type === 'play'
                        ? `第 ${item.moveNo} 手：${item.color === 'black' ? '黑' : '白'} (${item.x + 1},${item.y + 1})${item.captured ? `，提 ${item.captured} 子` : ''}`
                        : `第 ${item.moveNo} 手：${item.color === 'black' ? '黑' : '白'} 虛手`;

                    const actions = document.createElement('div');
                    actions.className = 'move-actions';

                    const upBtn = document.createElement('button');
                    upBtn.className = 'btn small';
                    upBtn.textContent = '上移';
                    upBtn.addEventListener('click', () => movePlayableStep('up', item.moveNo));

                    const downBtn = document.createElement('button');
                    downBtn.className = 'btn small';
                    downBtn.textContent = '下移';
                    downBtn.addEventListener('click', () => movePlayableStep('down', item.moveNo));

                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn small';
                    editBtn.textContent = '編輯';
                    editBtn.addEventListener('click', () => openEditPlayableStep(item.moveNo));

                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn small';
                    delBtn.textContent = '刪除';
                    delBtn.addEventListener('click', () => deletePlayableStep(item.moveNo));

                    actions.appendChild(upBtn);
                    actions.appendChild(downBtn);
                    actions.appendChild(editBtn);
                    actions.appendChild(delBtn);

                    wrap.appendChild(text);
                    wrap.appendChild(actions);
                    li.appendChild(wrap);
                } else {
                    if (item.type === 'setup') li.textContent = `擺盤：${item.color === 'black' ? '黑' : '白'} (${item.x + 1},${item.y + 1})`;
                    else if (item.type === 'label') li.textContent = `標記：(${item.x + 1},${item.y + 1}) → ${item.text}`;
                    else if (item.type === 'erase') li.textContent = `擦除：(${item.x + 1},${item.y + 1})`;
                }

                moveList.appendChild(li);
            });
        }

        function syncUI() {
            const s = territoryEstimate();
            document.getElementById('blackStones').textContent = s.blackStones;
            document.getElementById('whiteStones').textContent = s.whiteStones;
            document.getElementById('blackTerritory').textContent = s.blackTerritory;
            document.getElementById('whiteTerritory').textContent = s.whiteTerritory;
            document.getElementById('neutralPoints').textContent = s.neutral;

            const blackTotal = s.blackStones + s.blackTerritory + state.captures.black;
            const whiteTotal = s.whiteStones + s.whiteTerritory + state.captures.white;
            document.getElementById('scoreLead').textContent =
                blackTotal === whiteTotal ? '平手' :
                    (blackTotal > whiteTotal ? `黑領先 ${blackTotal - whiteTotal}` : `白領先 ${whiteTotal - blackTotal}`);

            statusText.textContent = `${state.current === 'black' ? '黑方' : '白方'}行棋`;
            document.getElementById('blackCaptures').textContent = state.captures.black;
            document.getElementById('whiteCaptures').textContent = state.captures.white;

            document.getElementById('modeText').textContent = state.freeMode
                ? '自由模式：可自由標記與下棋，不作記錄，也不匯出。'
                : state.setupMode
                    ? `擺盤模式：暫時不記手順，可自由擺黑白棋（${state.setupPlacement === 'auto' ? '自動輪流' : '手動選色'}）。`
                    : '一般示範模式，可自由落子與標記。';

            renderMoves();
            updateTimeline();
            document.querySelectorAll('#stoneChooser .btn').forEach(btn => btn.classList.toggle('active', btn.dataset.color === state.current));
            document.getElementById('setupModeBtn').classList.toggle('active', state.setupMode);
            document.getElementById('setupAutoBtn').classList.toggle('active', state.setupPlacement === 'auto');
            document.getElementById('setupManualBtn').classList.toggle('active', state.setupPlacement === 'manual');
            document.getElementById('freeModeBtn').classList.toggle('free-active', state.freeMode);
        }

        function drawGrid() {
            const { size, margin } = state;
            state.cell = (canvas.width - margin * 2) / (size - 1);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--line').trim();
            ctx.lineWidth = 2;
            for (let i = 0; i < size; i++) {
                const p = margin + i * state.cell;
                ctx.beginPath(); ctx.moveTo(margin, p); ctx.lineTo(canvas.width - margin, p); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p, margin); ctx.lineTo(p, canvas.height - margin); ctx.stroke();
            }
            ctx.fillStyle = ctx.strokeStyle;
            state.starPoints.forEach(([sx, sy]) => {
                ctx.beginPath();
                ctx.arc(margin + sx * state.cell, margin + sy * state.cell, 7, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawCoordinates() {
            const letters = 'ABCDEFGHJKLMNOPQRST';
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
            ctx.font = `600 ${Math.max(16, state.cell * 0.25)}px Arial`;
            ctx.textAlign = 'center';
            for (let i = 0; i < state.size; i++) {
                const px = state.margin + i * state.cell;
                ctx.fillText(letters[i], px, state.margin - 28);
                ctx.fillText(letters[i], px, canvas.height - state.margin + 36);
            }
            ctx.textAlign = 'right';
            for (let i = 0; i < state.size; i++) {
                const py = state.margin + i * state.cell;
                const n = state.size - i;
                ctx.fillText(n, state.margin - 18, py + 6);
                ctx.textAlign = 'left';
                ctx.fillText(n, canvas.width - state.margin + 18, py + 6);
                ctx.textAlign = 'right';
            }
        }

        function drawStoneAt(px, py, stone, r, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            const grad = ctx.createRadialGradient(px - r * .35, py - r * .35, 2, px, py, r);
            if (stone === 'black') { grad.addColorStop(0, '#666'); grad.addColorStop(1, '#111'); }
            else { grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#dbdbdb'); }
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = stone === 'black' ? '#000' : '#999';
            ctx.lineWidth = 1.4;
            ctx.stroke();
            ctx.restore();
        }

        function drawStones() {
            for (let y = 0; y < state.size; y++) {
                for (let x = 0; x < state.size; x++) {
                    const stone = state.board[y][x];
                    const px = state.margin + x * state.cell;
                    const py = state.margin + y * state.cell;
                    if (stone) drawStoneAt(px, py, stone, state.cell * 0.42, 1);
                }
            }

            for (let y = 0; y < state.size; y++) {
                for (let x = 0; x < state.size; x++) {
                    const stone = state.freeBoard[y][x];
                    if (!stone) continue;
                    const px = state.margin + x * state.cell;
                    const py = state.margin + y * state.cell;
                    drawStoneAt(px, py, stone, state.cell * 0.34, 0.72);
                }
            }

            state.moves.filter(m => m.type === 'play').forEach(m => {
                const px = state.margin + m.x * state.cell;
                const py = state.margin + m.y * state.cell;
                ctx.fillStyle = m.color === 'black' ? '#fff' : '#111';
                ctx.font = `700 ${Math.max(16, state.cell * 0.38)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String(m.moveNo), px, py + 1);
            });
        }

        function drawLabels() {
            state.labels.forEach((text, k) => {
                const [x, y] = parseKey(k);
                const px = state.margin + x * state.cell;
                const py = state.margin + y * state.cell;
                ctx.fillStyle = 'rgba(1,105,111,.92)';
                if (ctx.roundRect) {
                    ctx.beginPath();
                    ctx.roundRect(px - state.cell * .34, py - state.cell * .18, state.cell * .68, state.cell * .36, 10);
                    ctx.fill();
                } else {
                    ctx.fillRect(px - state.cell * .34, py - state.cell * .18, state.cell * .68, state.cell * .36);
                }
                ctx.fillStyle = '#fff';
                ctx.font = `700 ${Math.max(14, state.cell * 0.22)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, px, py);
            });

            state.freeLabels.forEach((text, k) => {
                const [x, y] = parseKey(k);
                const px = state.margin + x * state.cell;
                const py = state.margin + y * state.cell;
                ctx.save();
                ctx.globalAlpha = 0.82;
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--free').trim();
                if (ctx.roundRect) {
                    ctx.beginPath();
                    ctx.roundRect(px - state.cell * .34, py - state.cell * .18, state.cell * .68, state.cell * .36, 10);
                    ctx.fill();
                } else {
                    ctx.fillRect(px - state.cell * .34, py - state.cell * .18, state.cell * .68, state.cell * .36);
                }
                ctx.fillStyle = '#fff';
                ctx.font = `700 ${Math.max(14, state.cell * 0.22)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, px, py);
                ctx.restore();
            });
        }

        function draw() {
            drawGrid();
            drawCoordinates();
            drawStones();
            drawLabels();
        }

        function pointFromEvent(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (evt.clientX - rect.left) * scaleX;
            const y = (evt.clientY - rect.top) * scaleY;
            const gx = Math.round((x - state.margin) / state.cell);
            const gy = Math.round((y - state.margin) / state.cell);
            if (gx < 0 || gy < 0 || gx >= state.size || gy >= state.size) return null;
            return { x: gx, y: gy };
        }

        function coordToSgf(x, y) {
            return String.fromCharCode(97 + x) + String.fromCharCode(97 + y);
        }

        function sgfToCoord(s) {
            return { x: s.charCodeAt(0) - 97, y: s.charCodeAt(1) - 97 };
        }

        function esc(s) {
            return String(s).replace(/\\/g, '\\\\').replace(/]/g, '\\]');
        }

        function exportPNG() {
            draw();
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `go-board-${state.size}x${state.size}.png`;
            a.click();
        }

        function buildSGF() {
            const parts = [`(;FF[4]GM[1]CA[UTF-8]AP[TeachingGoBoard:3.2]SZ[${state.size}]`];
            const blacks = [];
            const whites = [];
            const empties = [];

            const playMoves = state.moves.filter(m => m.type === 'play' || m.type === 'pass');
            const setupSteps = state.replayMeta.steps.filter(s => s.type === 'setup');
            const setupKeys = new Set(setupSteps.map(s => key(s.x, s.y)));

            for (let y = 0; y < state.size; y++) {
                for (let x = 0; x < state.size; x++) {
                    const k = key(x, y);
                    const stone = state.board[y][x];
                    if (!stone) continue;
                    if (setupKeys.has(k)) {
                        if (stone === 'black') blacks.push(coordToSgf(x, y));
                        if (stone === 'white') whites.push(coordToSgf(x, y));
                    }
                }
            }

            state.replayMeta.steps.filter(s => s.type === 'erase').forEach(s => {
                empties.push(coordToSgf(s.x, s.y));
            });

            if (blacks.length) parts.push(`AB${blacks.map(v => `[${v}]`).join('')}`);
            if (whites.length) parts.push(`AW${whites.map(v => `[${v}]`).join('')}`);
            if (empties.length) parts.push(`AE${[...new Set(empties)].map(v => `[${v}]`).join('')}`);
            parts.push(`PL[${state.current === 'black' ? 'B' : 'W'}]`);

            const lb = [...state.labels.entries()].map(([k, v]) => {
                const [x, y] = parseKey(k);
                return `[${coordToSgf(x, y)}:${esc(v)}]`;
            }).join('');
            if (lb) parts.push(`LB${lb}`);

            playMoves.forEach(m => {
                if (m.type === 'play') parts.push(`;${m.color === 'black' ? 'B' : 'W'}[${coordToSgf(m.x, m.y)}]MN[${m.moveNo}]`);
                else parts.push(`;${m.color === 'black' ? 'B' : 'W'}[]MN[${m.moveNo}]`);
            });

            parts.push(')');
            return parts.join('');
        }

        function downloadSGF() {
            const blob = new Blob([buildSGF()], { type: 'application/x-go-sgf' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'teaching-board.sgf';
            a.click();
            setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        }

        function exportReplayJSONData() {
            return {
                version: 'teaching-go-json-2.2',
                size: state.size,
                current: state.current,
                board: cloneBoard(state.board),
                labels: [...state.labels.entries()],
                moves: state.moves.map(v => ({ ...v })),
                captureLog: state.captureLog.map(v => ({ ...v, captures: (v.captures || []).map(([x, y]) => [x, y]) })),
                replayMeta: JSON.parse(JSON.stringify(state.replayMeta)),
                captures: { ...state.captures },
                setupMode: state.setupMode,
                setupPlacement: state.setupPlacement
            };
        }

        function downloadReplayJSON() {
            const blob = new Blob([JSON.stringify(exportReplayJSONData(), null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'teaching-board-replay.json';
            a.click();
            setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        }

        function restoreStateFromJSON(data) {
            resetBoard(data.size || 19);
            state.size = data.size || 19;
            sizeSelect.value = String(state.size);
            state.current = data.current || 'black';
            state.board = Array.isArray(data.board)
                ? data.board.map(row => row.slice())
                : Array.from({ length: state.size }, () => Array(state.size).fill(null));
            state.freeBoard = Array.from({ length: state.size }, () => Array(state.size).fill(null));
            state.labels = new Map(data.labels || []);
            state.freeLabels = new Map();
            state.moves = (data.moves || []).map(v => ({ ...v }));
            state.captureLog = (data.captureLog || []).map(v => ({ ...v, captures: (v.captures || []).map(([x, y]) => [x, y]) }));
            state.replayMeta = data.replayMeta || { version: '1.0', steps: [] };
            state.captures = data.captures || { black: 0, white: 0 };
            state.setupMode = !!data.setupMode;
            state.setupPlacement = data.setupPlacement || 'auto';
            state.freeMode = false;
            updateStarPoints();
            snapshotBaseState();
            state.viewStep = null;
            syncUI();
            draw();
        }

        async function loadReplayJSONFile(file) {
            const text = await file.text();
            const data = JSON.parse(text);
            restoreStateFromJSON(data);
        }

        function parseProps(node) {
            const props = {};
            const re = /([A-Z]+)((?:\[(?:\\.|[^\]])*\])+)/g;
            let m;
            while ((m = re.exec(node))) {
                props[m[1]] = [...m[2].matchAll(/\[((?:\\.|[^\]])*)\]/g)]
                    .map(v => v[1].replace(/\\]/g, ']').replace(/\\\\/g, '\\'));
            }
            return props;
        }

        function loadSGFText(text) {
            const sz = /SZ\[(\d+)/.exec(text);
            resetBoard(sz ? Number(sz[1]) : state.size);
            if (sz) sizeSelect.value = sz[1];

            const nodes = [...text.matchAll(/;([^;()]+)/g)].map(m => m[1]);
            nodes.forEach((node, index) => {
                const p = parseProps(node);
                if (index === 0) {
                    (p.AB || []).forEach(pt => {
                        const { x, y } = sgfToCoord(pt);
                        state.board[y][x] = 'black';
                        state.moves.push({ type: 'setup', x, y, color: 'black' });
                        recordReplayStep({ type: 'setup', x, y, color: 'black' });
                    });
                    (p.AW || []).forEach(pt => {
                        const { x, y } = sgfToCoord(pt);
                        state.board[y][x] = 'white';
                        state.moves.push({ type: 'setup', x, y, color: 'white' });
                        recordReplayStep({ type: 'setup', x, y, color: 'white' });
                    });
                    (p.AE || []).forEach(pt => {
                        const { x, y } = sgfToCoord(pt);
                        state.board[y][x] = null;
                        state.moves.push({ type: 'erase', x, y });
                        recordReplayStep({ type: 'erase', x, y });
                    });
                    if (p.PL?.[0]) state.current = p.PL[0] === 'B' ? 'black' : 'white';

                    (p.LB || []).forEach(v => {
                        const [pt, label] = v.split(':');
                        if (!pt || label == null) return;
                        const { x, y } = sgfToCoord(pt);
                        state.labels.set(key(x, y), label);
                        state.moves.push({ type: 'label', x, y, text: label });
                        recordReplayStep({ type: 'label', x, y, text: label });
                    });
                } else {
                    if (p.B) {
                        state.current = 'black';
                        if (p.B[0] !== '') {
                            const c = sgfToCoord(p.B[0]);
                            state.board[c.y][c.x] = 'black';
                            const moveNo = moveCount() + 1;
                            const result = removeCaptured(state.board, 'black', c.x, c.y);
                            if (result.removed) state.captures.black += result.removed;
                            state.moves.push({ type: 'play', x: c.x, y: c.y, color: 'black', moveNo, captured: result.removed });
                            recordReplayStep({ type: 'play', moveNo, x: c.x, y: c.y, color: 'black', captures: result.groups.flat().map(([x, y]) => [x, y]) });
                            state.current = 'white';
                        } else {
                            const moveNo = moveCount() + 1;
                            state.moves.push({ type: 'pass', color: 'black', moveNo });
                            recordReplayStep({ type: 'pass', color: 'black', moveNo });
                            state.current = 'white';
                        }
                    }
                    if (p.W) {
                        state.current = 'white';
                        if (p.W[0] !== '') {
                            const c = sgfToCoord(p.W[0]);
                            state.board[c.y][c.x] = 'white';
                            const moveNo = moveCount() + 1;
                            const result = removeCaptured(state.board, 'white', c.x, c.y);
                            if (result.removed) state.captures.white += result.removed;
                            state.moves.push({ type: 'play', x: c.x, y: c.y, color: 'white', moveNo, captured: result.removed });
                            recordReplayStep({ type: 'play', moveNo, x: c.x, y: c.y, color: 'white', captures: result.groups.flat().map(([x, y]) => [x, y]) });
                            state.current = 'black';
                        } else {
                            const moveNo = moveCount() + 1;
                            state.moves.push({ type: 'pass', color: 'white', moveNo });
                            recordReplayStep({ type: 'pass', color: 'white', moveNo });
                            state.current = 'black';
                        }
                    }
                }
            });

            rebuildAllFromReplayMeta();
            state.setupMode = false;
            state.freeMode = false;
            state.viewStep = null;
            syncUI();
            draw();
        }

        canvas.addEventListener('click', evt => {
            const p = pointFromEvent(evt);
            if (!p) return;
            const tool = toolSelect.value;
            if (tool === 'play') placeStone(p.x, p.y);
            else if (tool === 'label') addLabel(p.x, p.y, customLabel.value.trim() || '標');
            else if (tool === 'erase') eraseAt(p.x, p.y);
        });

        document.querySelectorAll('#stoneChooser .btn').forEach(btn => btn.addEventListener('click', () => {
            state.current = btn.dataset.color;
            syncUI();
        }));

        sizeSelect.addEventListener('change', e => {
            state.baseState = null;
            resetBoard(e.target.value);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            state.baseState = null;
            resetBoard(state.size);
            snapshotBaseState();
        });

        document.getElementById('scoreBtn').addEventListener('click', syncUI);

        document.getElementById('passBtn').addEventListener('click', () => {
            state.baseState = null;
            if (state.setupMode || state.freeMode) return;
            const moveNo = moveCount() + 1;
            state.moves.push({ type: 'pass', color: state.current, moveNo });
            recordReplayStep({ type: 'pass', color: state.current, moveNo });
            state.current = state.current === 'black' ? 'white' : 'black';
            syncUI();
            draw();
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (state.freeMode) {
                state.freeBoard = Array.from({ length: state.size }, () => Array(state.size).fill(null));
                state.freeLabels = new Map();
                syncUI();
                draw();
                return;
            }
            if (!state.replayMeta.steps.length) return;
            state.replayMeta.steps.pop();
            rebuildAllFromReplayMeta();
        });

        document.getElementById('themeBtn').addEventListener('click', () => {
            const root = document.documentElement;
            root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            draw();
        });

        document.getElementById('exportBtn').addEventListener('click', exportPNG);
        document.getElementById('saveSgfBtn').addEventListener('click', downloadSGF);
        document.getElementById('loadSgfBtn').addEventListener('click', () => document.getElementById('sgfInput').click());
        document.getElementById('saveJsonBtn').addEventListener('click', downloadReplayJSON);
        document.getElementById('loadJsonBtn').addEventListener('click', () => document.getElementById('jsonInput').click());

        document.getElementById('sgfInput').addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;
            loadSGFText(await file.text());
            e.target.value = '';
        });

        document.getElementById('jsonInput').addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;
            await loadReplayJSONFile(file);
            e.target.value = '';
        });

        document.getElementById('setupModeBtn').addEventListener('click', () => {
            if (state.freeMode) state.freeMode = false;
            state.setupMode = !state.setupMode;
            state.baseState = null;
            state.viewStep = null;
            if (!state.setupMode) snapshotBaseState();
            syncUI();
            draw();
        });

        document.getElementById('setupAutoBtn').addEventListener('click', () => {
            state.setupPlacement = 'auto';
            syncUI();
            draw();
        });

        document.getElementById('setupManualBtn').addEventListener('click', () => {
            state.setupPlacement = 'manual';
            syncUI();
            draw();
        });

        document.getElementById('freeModeBtn').addEventListener('click', () => {
            if (state.setupMode) state.setupMode = false;
            state.freeMode = !state.freeMode;
            syncUI();
            draw();
        });

        document.getElementById('prevStepBtn').addEventListener('click', () => {
            stopAutoplay();
            const total = state.baseState ? state.baseState.replayMeta.steps.filter(s => isPlayableStep(s)).length : getPlayableMoves().length;
            setViewStep((state.viewStep ?? total) - 1);
        });

        document.getElementById('nextStepBtn').addEventListener('click', () => {
            stopAutoplay();
            const total = state.baseState ? state.baseState.replayMeta.steps.filter(s => isPlayableStep(s)).length : getPlayableMoves().length;
            setViewStep((state.viewStep ?? total) + 1);
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            state.autoplay ? stopAutoplay() : startAutoplay();
        });

        document.getElementById('timeline').addEventListener('input', e => {
            stopAutoplay();
            setViewStep(Number(e.target.value));
        });

        editType.addEventListener('change', () => {
            const pass = editType.value === 'pass';
            editX.disabled = pass;
            editY.disabled = pass;
        });

        document.getElementById('cancelEditBtn').addEventListener('click', () => {
            moveEditor.classList.remove('show');
            state.editingMoveNo = null;
        });

        document.getElementById('saveEditBtn').addEventListener('click', saveEditPlayableStep);

        moveEditor.addEventListener('click', e => {
            if (e.target === moveEditor) {
                moveEditor.classList.remove('show');
                state.editingMoveNo = null;
            }
        });

        resetBoard(19);
        snapshotBaseState();
        updateTimeline();
    </script>
</body>

</html>
