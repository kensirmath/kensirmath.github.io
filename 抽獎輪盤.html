<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抽獎輪盤</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root,
        [data-theme="light"] {
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);

            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;

            --color-bg: #f7f6f2;
            --color-surface: #f9f8f5;
            --color-surface-2: #ffffff;
            --color-border: #d4d1ca;
            --color-text: #28251d;
            --color-text-muted: #6d6a63;
            --color-primary: #01696f;
            --color-primary-hover: #0c4e54;
            --color-primary-highlight: #d8ece8;
            --color-accent: #da7101;
            --shadow-sm: 0 1px 2px rgba(40, 37, 29, 0.08);
            --shadow-md: 0 10px 30px rgba(40, 37, 29, 0.12);
            --radius-md: 0.75rem;
            --radius-lg: 1.25rem;
            --radius-full: 999px;
            --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
            --font-body: 'Noto Sans TC', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--color-text);
            background:
                radial-gradient(circle at top, rgba(1, 105, 111, 0.10), transparent 30%),
                linear-gradient(180deg, #fbfbf8 0%, var(--color-bg) 100%);
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .page {
            width: min(1120px, calc(100% - 2rem));
            margin: 0 auto;
            padding: var(--space-8) 0 var(--space-10);
        }

        .hero {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: var(--space-8);
            align-items: start;
        }

        .panel {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(40, 37, 29, 0.12);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
        }

        .intro {
            padding: var(--space-8);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: 0.45rem 0.85rem;
            background: var(--color-primary-highlight);
            color: var(--color-primary);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
        }

        h1 {
            margin: var(--space-4) 0 var(--space-3);
            font-size: var(--text-2xl);
            line-height: 1.06;
        }

        .intro p {
            margin: 0;
            color: var(--color-text-muted);
            max-width: 34ch;
        }

        .controls {
            margin-top: var(--space-8);
            display: grid;
            gap: var(--space-5);
        }

        .control-row {
            display: grid;
            gap: var(--space-3);
        }

        label {
            font-size: var(--text-sm);
            font-weight: 700;
        }

        input[type="number"],
        textarea {
            width: 100%;
            border: 1px solid rgba(40, 37, 29, 0.14);
            border-radius: var(--radius-md);
            background: var(--color-surface-2);
            color: var(--color-text);
            padding: 0.9rem 1rem;
            box-shadow: var(--shadow-sm);
            transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
        }

        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(1, 105, 111, 0.12);
        }

        textarea {
            min-height: 11rem;
            resize: vertical;
            line-height: 1.55;
        }

        .hint {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            margin-top: var(--space-2);
        }

        .btn {
            min-height: 48px;
            border-radius: var(--radius-full);
            padding: 0.85rem 1.2rem;
            border: none;
            font-weight: 800;
            letter-spacing: 0.01em;
            transition: transform var(--transition), background var(--transition), opacity var(--transition), box-shadow var(--transition);
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px) scale(0.99);
        }

        .btn-primary {
            background: var(--color-primary);
            color: #fff;
            box-shadow: 0 10px 24px rgba(1, 105, 111, 0.22);
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.95);
            color: var(--color-text);
            border: 1px solid rgba(40, 37, 29, 0.12);
        }

        .wheel-card {
            padding: var(--space-8);
            display: grid;
            justify-items: center;
            gap: var(--space-5);
        }

        .wheel-shell {
            position: relative;
            width: min(100%, 460px);
            aspect-ratio: 1;
            display: grid;
            place-items: center;
        }

        .pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 34px solid var(--color-accent);
            filter: drop-shadow(0 8px 10px rgba(218, 113, 1, 0.28));
            z-index: 4;
        }

        .wheel-frame {
            position: absolute;
            inset: 2.5%;
            border-radius: 50%;
            border: 10px solid rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 0 0 2px rgba(40, 37, 29, 0.08), 0 14px 30px rgba(40, 37, 29, 0.12);
            pointer-events: none;
            z-index: 2;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--color-surface-2);
            box-shadow: var(--shadow-md);
        }

        .hub {
            position: absolute;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(180deg, #13838a 0%, #01555b 100%);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.2), 0 12px 24px rgba(1, 105, 111, 0.28);
            z-index: 3;
            letter-spacing: 0.08em;
        }

        .status {
            width: 100%;
            display: grid;
            gap: var(--space-3);
            text-align: center;
        }

        .announce {
            min-height: 92px;
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, rgba(1, 105, 111, 0.08), rgba(255, 255, 255, 0.86));
            border: 1px solid rgba(1, 105, 111, 0.14);
            display: grid;
            place-items: center;
        }

        .announce small {
            display: block;
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-bottom: 0.35rem;
            letter-spacing: 0.04em;
        }

        .announce strong {
            font-size: var(--text-xl);
            line-height: 1.2;
        }

        .meta {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
        }

        @media (max-width: 920px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .intro,
            .wheel-card {
                padding: var(--space-6);
            }
        }

        @media (max-width: 560px) {
            .page {
                width: min(100% - 1rem, 100%);
                padding-top: var(--space-4);
            }

            .intro,
            .wheel-card {
                padding: 1rem;
            }

            .pointer {
                border-left-width: 14px;
                border-right-width: 14px;
                border-top-width: 28px;
            }

            .hub {
                width: 72px;
                height: 72px;
                font-size: var(--text-sm);
            }

            .actions {
                display: grid;
            }

            .btn {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            .btn {
                transition: none;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="hero">
            <div class="panel intro">
                <span class="eyebrow">Lucky Wheel</span>
                <h1>抽獎輪盤</h1>
                <p>先設定項目數量，再輸入每行一個選項；如果留空，輪盤會自動用 1 至 n 顯示。按下轉動後，輪盤會以隨機但自然的速度旋轉，約 3 至 5 秒後停在結果。</p>

                <div class="controls">
                    <div class="control-row">
                        <label for="countInput">項目數量 n</label>
                        <!-- <input id="countInput" type="number" min="2" max="24" value="8" /> -->
                        <input id="countInput" type="number" value="8" />
                        <div class="hint">可選 2 至 24 項；改變數量後會自動更新輪盤。</div>
                    </div>

                    <div class="control-row">
                        <label for="itemsInput">項目名稱</label>
                        <textarea id="itemsInput" placeholder="每行輸入一個項目，例如：&#10;Alice&#10;Bob&#10;Charlie"></textarea>
                        <div class="hint">可少於 n 行；未填寫的位置會自動補成數字。</div>
                    </div>

                    <div class="actions">
                        <button class="btn btn-primary" id="spinBtn" type="button">開始轉動</button>
                        <button class="btn btn-secondary" id="resetBtn" type="button">重設內容</button>
                    </div>
                </div>
            </div>

            <div class="panel wheel-card">
                <div class="wheel-shell">
                    <div class="pointer" aria-hidden="true"></div>
                    <canvas id="wheelCanvas" width="900" height="900" aria-label="抽獎輪盤"></canvas>
                    <div class="wheel-frame" aria-hidden="true"></div>
                    <div class="hub" aria-hidden="true">SPIN</div>
                </div>

                <div class="status">
                    <div class="announce" aria-live="polite">
                        <div>
                            <small>抽獎結果</small>
                            <strong id="resultText">尚未開始</strong>
                        </div>
                    </div>
                    <div class="meta" id="statusText">請先設定項目，然後按「開始轉動」。</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const countInput = document.getElementById('countInput');
        const itemsInput = document.getElementById('itemsInput');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultText = document.getElementById('resultText');
        const statusText = document.getElementById('statusText');
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        let currentRotation = 0;
        let spinning = false;
        let activeItems = [];
        const colors = ['#01696f', '#0f8b94', '#da7101', '#e09b2d', '#437a22', '#7a39bb', '#006494', '#a13544', '#964219', '#5e7d00'];

        function clampCountBackup(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return 2;
            return Math.max(2, Math.min(24, Math.round(n)));
        }

        function clampCount(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return 1;
            return n;
        }

        function buildItems() {
            const count = clampCount(countInput.value);
            countInput.value = count;
            const rawLines = itemsInput.value.split(/\n+/).map(v => v.trim()).filter(Boolean);
            const items = [];
            for (let i = 0; i < count; i++) {
                items.push(rawLines[i] || String(i + 1));
            }
            return items;
        }

        function polarToCartesian(cx, cy, r, angle) {
            return {
                x: cx + Math.cos(angle) * r,
                y: cy + Math.sin(angle) * r
            };
        }

        function drawWheel(items, rotation = currentRotation) {
            const size = canvas.width;
            const center = size / 2;
            const radius = size * 0.46;
            const slice = (Math.PI * 2) / items.length;
            ctx.clearRect(0, 0, size, size);
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(rotation);
            ctx.translate(-center, -center);

            for (let i = 0; i < items.length; i++) {
                const start = -Math.PI / 2 + i * slice;
                const end = start + slice;
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, start, end);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();

                ctx.strokeStyle = 'rgba(255,255,255,0.88)';
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(start + slice / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ffffff';
                const fontSize = Math.max(24, Math.min(38, 300 / items.length + 10));
                ctx.font = `700 ${fontSize}px "Noto Sans TC", sans-serif`;
                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                ctx.shadowBlur = 6;
                let text = items[i];
                if (text.length > 11) text = text.slice(0, 10) + '…';
                ctx.fillText(text, radius - 28, 12);
                ctx.restore();
            }

            ctx.restore();

            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(40,37,29,0.08)';
            ctx.lineWidth = 10;
            ctx.stroke();
        }

        function updateWheel() {
            activeItems = buildItems();
            drawWheel(activeItems, currentRotation);
            if (!spinning) {
                statusText.textContent = `目前共有 ${activeItems.length} 個項目。`;
            }
        }

        function pickTargetIndex(length) {
            return Math.floor(Math.random() * length);
        }

        function spinWheel() {
            if (spinning) return;
            activeItems = buildItems();
            if (activeItems.length < 2) return;

            spinning = true;
            spinBtn.disabled = true;
            spinBtn.style.opacity = '0.7';
            resultText.textContent = '轉動中…';
            statusText.textContent = '輪盤正在隨機轉動，請稍候。';

            const duration = 3000 + Math.random() * 2000;
            const extraTurns = 5 + Math.floor(Math.random() * 4);
            const targetIndex = pickTargetIndex(activeItems.length);
            const slice = (Math.PI * 2) / activeItems.length;
            const targetCenterFromTop = targetIndex * slice + slice / 2;
            const finalNormalized = (Math.PI * 2 - targetCenterFromTop) % (Math.PI * 2);
            const currentNormalized = ((currentRotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const delta = ((finalNormalized - currentNormalized) + Math.PI * 2) % (Math.PI * 2);
            const targetRotation = currentRotation + extraTurns * Math.PI * 2 + delta;
            const startRotation = currentRotation;
            const startTime = performance.now();

            const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

            function animate(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);
                const eased = easeOutCubic(t);
                currentRotation = startRotation + (targetRotation - startRotation) * eased;
                drawWheel(activeItems, currentRotation);

                if (t < 1) {
                    requestAnimationFrame(animate);
                    return;
                }

                currentRotation = targetRotation % (Math.PI * 2);
                drawWheel(activeItems, currentRotation);
                const winner = activeItems[targetIndex];
                resultText.textContent = winner;
                statusText.textContent = `已完成抽獎，結果是「${winner}」。`;
                spinBtn.disabled = false;
                spinBtn.style.opacity = '1';
                spinning = false;
            }

            requestAnimationFrame(animate);
        }

        countInput.addEventListener('input', updateWheel);
        itemsInput.addEventListener('input', updateWheel);
        spinBtn.addEventListener('click', spinWheel);
        resetBtn.addEventListener('click', () => {
            if (spinning) return;
            countInput.value = 8;
            itemsInput.value = '';
            currentRotation = 0;
            resultText.textContent = '尚未開始';
            statusText.textContent = '請先設定項目，然後按「開始轉動」。';
            updateWheel();
        });

        updateWheel();
    </script>
</body>

</html>
