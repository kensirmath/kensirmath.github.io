<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>friend-bill-splitter</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #f3f0ec; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #6f6d68; --color-text-faint: #9c9991; --color-text-inverse: #f9f8f4;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8;
      --color-success: #437a22; --color-success-highlight: #d4dfcc;
      --color-warning: #964219; --color-warning-highlight: #ddcfc6;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(40,37,29,0.06); --shadow-md: 0 8px 24px rgba(40,37,29,0.08);
      --font-body: 'Satoshi', 'Inter', sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #22211f; --color-border: #393836; --color-divider: #2a2927;
      --color-text: #e0dfdb; --color-text-muted: #aba8a1; --color-text-faint: #7b7872; --color-text-inverse: #171614;
      --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
      --color-success: #76b851; --color-success-highlight: #364330;
      --color-warning: #cb7d54; --color-warning-highlight: #4e4038;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2); --shadow-md: 0 10px 28px rgba(0,0,0,0.28);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: none; text-size-adjust: none; scroll-behavior: smooth; }
    body { margin: 0; min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); line-height: 1.55; color: var(--color-text); background: linear-gradient(180deg, var(--color-bg), var(--color-surface-offset)); }
    button, input, select { font: inherit; color: inherit; }
    button { cursor: pointer; border: 0; }
    table { width: 100%; border-collapse: collapse; }
    .skip-link { position: absolute; left: var(--space-4); top: -3rem; background: var(--color-primary); color: var(--color-text-inverse); padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); z-index: 20; }
    .skip-link:focus { top: var(--space-4); }
    .app-shell { max-width: 1480px; margin: 0 auto; padding: var(--space-4); }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); padding: var(--space-4) 0 var(--space-6); }
    .brand { display: flex; align-items: center; gap: var(--space-3); }
    .brand-mark { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--color-primary), color-mix(in srgb, var(--color-primary) 55%, white)); display: grid; place-items: center; color: var(--color-text-inverse); box-shadow: var(--shadow-sm); }
    .brand h1 { font-size: var(--text-xl); line-height: 1.1; margin: 0; }
    .brand p { margin: 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .top-actions { display: flex; gap: var(--space-3); align-items: center; flex-wrap: wrap; }
    .panel { background: color-mix(in srgb, var(--color-surface) 88%, transparent); border: 1px solid var(--color-border); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); backdrop-filter: blur(10px); }
    .hero { display: grid; grid-template-columns: 340px 1fr; gap: var(--space-4); }
    .sidebar, .workspace { min-width: 0; }
    .sidebar { padding: var(--space-4); display: grid; gap: var(--space-4); align-content: start; }
    .workspace { padding: var(--space-4); display: grid; gap: var(--space-4); }
    .section-title { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); margin-bottom: var(--space-3); }
    .section-title h2, .section-title h3 { margin: 0; font-size: var(--text-lg); }
    .hint { color: var(--color-text-muted); font-size: var(--text-sm); }
    .stack, .field-grid, .field { display: grid; gap: var(--space-3); }
    .field { gap: var(--space-2); }
    .field label, .legend-label { font-size: var(--text-sm); font-weight: 700; }
    .input, .select, textarea { width: 100%; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.9rem 0.95rem; min-height: 48px; }
    textarea { min-height: 96px; resize: vertical; }
    .btn { min-height: 46px; padding: 0.85rem 1rem; border-radius: var(--radius-md); display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); transition: transform var(--transition), background var(--transition), border-color var(--transition); }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--color-primary); color: var(--color-text-inverse); }
    .btn-secondary { background: var(--color-surface-2); border: 1px solid var(--color-border); }
    .btn-soft { background: var(--color-primary-highlight); color: var(--color-primary-hover); }
    .theme-toggle { width: 46px; padding: 0; }
    .friend-list { display: grid; gap: var(--space-2); }
    .friend-row { display: grid; grid-template-columns: auto 1fr auto; gap: var(--space-3); align-items: center; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-3); }
    .friend-badge { width: 36px; height: 36px; border-radius: 50%; background: var(--color-primary-highlight); color: var(--color-primary); display: grid; place-items: center; font-weight: 700; }
    .chip-row { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .chip { padding: 0.55rem 0.8rem; border-radius: var(--radius-full); background: var(--color-surface-2); border: 1px solid var(--color-border); font-size: var(--text-sm); }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); }
    .metric { padding: var(--space-4); border-radius: var(--radius-lg); background: var(--color-surface-2); border: 1px solid var(--color-border); }
    .metric .label { color: var(--color-text-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.08em; }
    .metric strong { display: block; margin-top: var(--space-2); font-size: var(--text-lg); }
    .toolbar, .inline-actions { display: flex; justify-content: space-between; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
    .table-wrap { overflow: auto; border: 1px solid var(--color-border); border-radius: var(--radius-xl); background: var(--color-surface-2); }
    .bill-table { min-width: 1120px; font-size: var(--text-sm); }
    .bill-table th, .bill-table td { border-bottom: 1px solid var(--color-divider); padding: 0.9rem 0.75rem; text-align: center; vertical-align: top; }
    .remove-btn { min-height: 36px; padding: 0.45rem 0.7rem; border-radius: var(--radius-md); background: var(--color-warning-highlight); color: var(--color-warning); border: 1px solid var(--color-warning); }
    .warn-box { padding: var(--space-3); border-radius: var(--radius-lg); border: 1px solid var(--color-warning); background: var(--color-warning-highlight); color: var(--color-warning); font-size: var(--text-sm); }
    .ok-box { padding: var(--space-3); border-radius: var(--radius-lg); border: 1px solid var(--color-success); background: var(--color-success-highlight); color: var(--color-success); font-size: var(--text-sm); }
    .bill-table th:first-child, .bill-table td:first-child { text-align: left; min-width: 260px; position: sticky; left: 0; background: var(--color-surface-2); z-index: 1; }
    .bill-table thead th { position: sticky; top: 0; z-index: 2; background: color-mix(in srgb, var(--color-surface) 92%, transparent); backdrop-filter: blur(8px); }
    .bill-table tbody tr:hover td { background: color-mix(in srgb, var(--color-primary-highlight) 40%, var(--color-surface-2)); }
    .item-title { font-weight: 700; }
    .item-meta { color: var(--color-text-muted); font-size: var(--text-xs); margin-top: var(--space-1); }
    .friends-picker { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: var(--space-2); min-width: 260px; }
    .friend-check { display: flex; align-items: center; gap: 0.45rem; justify-content: flex-start; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.45rem 0.55rem; }
    .friend-check input[type="checkbox"] { width: 16px; height: 16px; }
    .friend-check input[type="number"], .friend-check input[type="text"] { width: 100%; min-width: 140px; appearance: textfield; -moz-appearance: textfield; }
    .friend-check input[type="number"]::-webkit-outer-spin-button, .friend-check input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .money-cell { font-variant-numeric: tabular-nums lining-nums; white-space: nowrap; }
    .badge { display: inline-flex; align-items: center; gap: 0.35rem; border-radius: var(--radius-full); padding: 0.28rem 0.6rem; font-size: var(--text-xs); font-weight: 700; }
    .badge.equal { background: var(--color-primary-highlight); color: var(--color-primary-hover); }
    .badge.advance { background: var(--color-success-highlight); color: var(--color-success); }
    .money-negative { color: var(--color-success); font-weight: 700; }
    .money-positive { color: var(--color-warning); font-weight: 700; }
    .settlement { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .settle-card { padding: var(--space-4); border: 1px solid var(--color-border); border-radius: var(--radius-lg); background: var(--color-surface-2); }
    .settle-list { display: grid; gap: var(--space-2); margin-top: var(--space-3); }
    .settle-row { display: flex; justify-content: space-between; gap: var(--space-3); align-items: center; padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-bg); }
    .empty-note { color: var(--color-text-muted); padding: var(--space-4); border: 1px dashed var(--color-border); border-radius: var(--radius-lg); }
    .footer-note { color: var(--color-text-muted); font-size: var(--text-sm); }
    @media (max-width: 1180px) { .hero, .settlement { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 720px) { .app-shell { padding: var(--space-3); } .topbar { align-items: flex-start; flex-direction: column; } .summary-grid { grid-template-columns: 1fr; } .bill-table { min-width: 940px; } .friends-picker { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">跳到主要內容</a>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7h16"></path>
            <path d="M6 7c.8 5 2.6 8 6 10 3.4-2 5.2-5 6-10"></path>
            <path d="M12 5v12"></path>
          </svg>
        </div>
        <div>
          <h1>與朋友拆帳單</h1>
          <p>改為獨立設定「誰替大家支付」，拆帳只保留均分。</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn btn-secondary theme-toggle" type="button" data-theme-toggle aria-label="切換深色模式">☾</button>
        <button class="btn btn-primary" type="button" id="addItemTop">新增分項</button>
      </div>
    </header>

    <main id="main" class="hero">
      <aside class="sidebar panel">
        <section>
          <div class="section-title"><h2>朋友名單</h2><span class="hint">可隨時增減</span></div>
          <div class="field-grid">
            <div class="field">
              <label for="friendName">新增朋友</label>
              <div class="inline-actions">
                <input id="friendName" class="input" type="text" placeholder="例如：阿明" />
                <button class="btn btn-primary" type="button" id="addFriendBtn">加入</button>
              </div>
            </div>
          </div>
          <div id="friendList" class="friend-list" style="margin-top: 1rem;"></div>
        </section>

        <section>
          <div class="section-title"><h2>拆帳規則</h2></div>
          <div class="chip-row">
            <span class="chip">只保留均分</span>
            <span class="chip">替大家支付獨立設定</span>
            <span class="chip">可選付款人不參與均分</span>
            <span class="chip">每項可勾選朋友</span>
          </div>
        </section>

        <section>
          <div class="section-title"><h2>新增分項</h2></div>
          <div class="stack">
            <div class="field">
              <label for="itemName">項目名稱</label>
              <input id="itemName" class="input" type="text" placeholder="例如：西班牙海鮮飯" />
            </div>
            <div class="field">
              <label for="itemAmount">小計金額</label>
              <input id="itemAmount" class="input" type="number" min="0" step="0.1" placeholder="0.0" />
            </div>
            <div class="field">
              <label for="itemSplitMode">拆帳方式</label>
              <select id="itemSplitMode" class="select">
                <option value="equal">均分</option>
                <option value="custom">不均分</option>
              </select>
            </div>
            <div class="field">
              <span class="legend-label">不均分金額輸入</span>
              <div id="customAmountEditor" class="friends-picker"></div>
            </div>
            <div class="field">
              <label for="itemPaidBy">誰替大家支付</label>
              <select id="itemPaidBy" class="select"></select>
            </div>
            <div class="field">
              <span class="legend-label">不均分金額輸入</span>
              <div id="customAmountEditor" class="friends-picker"></div>
            </div>
            <div class="field">
              <label for="itemNote">備註</label>
              <textarea id="itemNote" placeholder="例如：付款人可不參與均分，但會先代付整項"></textarea>
            </div>
            <div class="field">
              <span class="legend-label">參與均分的朋友</span>
              <div id="participantPicker" class="friends-picker"></div>
            </div>
            <button class="btn btn-primary" type="button" id="createItemBtn">加入帳單</button>
          </div>
        </section>
      </aside>

      <section class="workspace panel">
        <section>
          <div class="section-title"><h2>帳單總覽</h2><span class="hint">付款人獨立於均分名單之外</span></div>
          <div id="metrics" class="summary-grid"></div>
          <div id="validationBox" style="margin-top:1rem;"></div>
        </section>

        <section>
          <div class="toolbar">
            <div>
              <h3 style="margin:0; font-size: var(--text-lg);">拆帳表格</h3>
              <p class="hint" style="margin: 0.2rem 0 0;">付款人一欄會以負數顯示代墊金額，均分餘下的十分位尾數亦會由付款人承擔。</p>
            </div>
            <div class="inline-actions">
              <button class="btn btn-secondary" type="button" id="loadDemoBtn">載入示例資料</button>
              <button class="btn btn-secondary" type="button" id="importCsvBtn">匯入 CSV</button>
              <button class="btn btn-secondary" type="button" id="importXlsxBtn">匯入 Excel</button>
              <button class="btn btn-secondary" type="button" id="exportCsvBtn">匯出 CSV</button>
              <button class="btn btn-secondary" type="button" id="exportXlsxBtn">匯出 Excel</button>
              <button class="btn btn-soft" type="button" id="resetBtn">清空重設</button>
            </div>
          </div>
          <div class="table-wrap" style="margin-top: 1rem;">
            <table class="bill-table" aria-label="拆帳總表">
              <thead id="billHead"></thead>
              <tbody id="billBody"></tbody>
              <tfoot id="billFoot"></tfoot>
            </table>
          </div>
        </section>

        <section class="settlement">
          <div class="settle-card">
            <div class="section-title"><h3>每位朋友結算</h3></div>
            <div id="personSummary" class="settle-list"></div>
          </div>
          <div class="settle-card">
            <div class="section-title"><h3>建議過數</h3></div>
            <div id="transferList" class="settle-list"></div>
          </div>
        </section>

        <p class="footer-note">規則：均分會按參與者平均到最接近 0.1，餘下十分位尾數由付款人承擔；不均分則可逐位輸入各參與者應付金額。另已加入 CSV / Excel 匯入與匯出，方便備份及下次繼續工作。</p>
        <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" hidden />
      </section>
    </main>
  </div>

  <script>
    const state = {
      friends: [],
      items: []
    };

    const els = {
      friendList: document.getElementById('friendList'),
      participantPicker: document.getElementById('participantPicker'),
      paidBy: document.getElementById('itemPaidBy'),
      billHead: document.getElementById('billHead'),
      billBody: document.getElementById('billBody'),
      billFoot: document.getElementById('billFoot'),
      metrics: document.getElementById('metrics'),
      personSummary: document.getElementById('personSummary'),
      transferList: document.getElementById('transferList'),
      friendName: document.getElementById('friendName'),
      itemName: document.getElementById('itemName'),
      itemAmount: document.getElementById('itemAmount'),
      itemNote: document.getElementById('itemNote'),
      itemSplitMode: document.getElementById('itemSplitMode'),
      customAmountEditor: document.getElementById('customAmountEditor'),
      fileInput: document.getElementById('fileInput'),
      validationBox: document.getElementById('validationBox')
    };

    const currency = n => Number(n || 0).toLocaleString('zh-HK', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    const short = name => name.trim().slice(0, 1).toUpperCase();

    function roundToTenth(value) {
      return Math.round((value + Number.EPSILON) * 10) / 10;
    }

    function normalizeShares(item) {
      const map = Object.fromEntries(state.friends.map(name => [name, 0]));
      const selected = state.friends.filter(f => item.participants.includes(f));
      if (!item.paidBy || !state.friends.includes(item.paidBy)) return map;
      if (!selected.length) {
        map[item.paidBy] = -roundToTenth(item.amount);
        return map;
      }

      if (item.splitMode === 'custom') {
        selected.forEach(name => {
          const value = roundToTenth(Number((item.customShares || {})[name] || 0));
          map[name] = value;
        });
        map[item.paidBy] = roundToTenth((map[item.paidBy] || 0) - item.amount);
        return map;
      }

      const rawShare = item.amount / selected.length;
      const baseShare = roundToTenth(rawShare);
      selected.forEach(name => { map[name] = baseShare; });
      const distributed = roundToTenth(baseShare * selected.length);
      const remainder = roundToTenth(item.amount - distributed);
      map[item.paidBy] = roundToTenth((map[item.paidBy] || 0) + remainder - item.amount);
      return map;
    }

    function computeSettlement() {
      const net = Object.fromEntries(state.friends.map(name => [name, 0]));
      const paid = Object.fromEntries(state.friends.map(name => [name, 0]));
      const validations = [];
      const rows = state.items.map(item => {
        const shares = normalizeShares(item);
        const participantTotal = roundToTenth(item.participants.reduce((sum, name) => sum + roundToTenth(Number((item.customShares || {})[name] || 0)), 0));
        if (item.splitMode === 'custom') {
          const diff = roundToTenth(item.amount - participantTotal);
          validations.push({ id: item.id, name: item.name, diff });
        }
        state.friends.forEach(name => { net[name] = roundToTenth(net[name] + (shares[name] || 0)); });
        paid[item.paidBy] = roundToTenth((paid[item.paidBy] || 0) + item.amount);
        return { ...item, shares };
      });
      return { rows, net, paid, validations };
    }

    function suggestTransfers(netMap) {
      const debtors = [];
      const creditors = [];
      Object.entries(netMap).forEach(([name, value]) => {
        if (value > 0.049) debtors.push({ name, amount: value });
        if (value < -0.049) creditors.push({ name, amount: -value });
      });
      const transfers = [];
      let i = 0, j = 0;
      while (i < debtors.length && j < creditors.length) {
        const amount = roundToTenth(Math.min(debtors[i].amount, creditors[j].amount));
        transfers.push({ from: debtors[i].name, to: creditors[j].name, amount });
        debtors[i].amount = roundToTenth(debtors[i].amount - amount);
        creditors[j].amount = roundToTenth(creditors[j].amount - amount);
        if (debtors[i].amount <= 0.049) i++;
        if (creditors[j].amount <= 0.049) j++;
      }
      return transfers;
    }

    function renderCustomAmountEditor(values = {}) {
      const mode = els.itemSplitMode.value;
      els.customAmountEditor.innerHTML = '';
      if (!state.friends.length) {
        els.customAmountEditor.innerHTML = '<div class="empty-note">請先新增朋友，才可輸入不均分金額。</div>';
        els.customAmountEditor.style.display = mode === 'custom' ? 'grid' : 'none';
        return;
      }
      state.friends.forEach(name => {
        const wrap = document.createElement('label');
        wrap.className = 'friend-check';
        const input = document.createElement('input');
        input.type = 'number';
        input.min = '0';
        input.step = '0.1';
        input.placeholder = '0.0';
        input.className = 'input';
        input.style.minHeight = '40px';
        input.style.padding = '0.55rem 0.65rem';
        input.dataset.customName = name;
        input.value = values[name] ?? '';
        wrap.appendChild(document.createElement('span')).textContent = name;
        wrap.appendChild(input);
        els.customAmountEditor.appendChild(wrap);
      });
      els.customAmountEditor.style.display = mode === 'custom' ? 'grid' : 'none';
    }

    function serializeState() {
      return { friends: state.friends, items: state.items };
    }

    function applyImportedState(data) {
      if (!data || !Array.isArray(data.friends) || !Array.isArray(data.items)) return;
      state.friends = data.friends;
      state.items = data.items.map(item => ({
        id: item.id || crypto.randomUUID(),
        name: item.name || '',
        amount: roundToTenth(Number(item.amount || 0)),
        splitMode: item.splitMode || 'equal',
        paidBy: item.paidBy || data.friends[0] || '',
        participants: Array.isArray(item.participants) ? item.participants : [],
        customShares: item.customShares || {},
        note: item.note || ''
      }));
      render();
    }

    function exportCsv() {
      const rows = state.items.map(item => ({
        id: item.id, name: item.name, amount: item.amount, splitMode: item.splitMode, paidBy: item.paidBy,
        participants: item.participants.join('|'), customShares: JSON.stringify(item.customShares || {}), note: item.note || ''
      }));
      const ws = XLSX.utils.json_to_sheet(rows);
      const csv = XLSX.utils.sheet_to_csv(ws);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bill-splitter-backup.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportXlsx() {
      const wb = XLSX.utils.book_new();
      const itemsSheet = XLSX.utils.json_to_sheet(state.items.map(item => ({
        id: item.id, name: item.name, amount: item.amount, splitMode: item.splitMode, paidBy: item.paidBy,
        participants: item.participants.join('|'), customShares: JSON.stringify(item.customShares || {}), note: item.note || ''
      })));
      const metaSheet = XLSX.utils.json_to_sheet(state.friends.map(name => ({ friend: name })));
      XLSX.utils.book_append_sheet(wb, itemsSheet, 'items');
      XLSX.utils.book_append_sheet(wb, metaSheet, 'friends');
      XLSX.writeFile(wb, 'bill-splitter-backup.xlsx');
    }

    function importFile(kind) {
      els.fileInput.dataset.kind = kind;
      els.fileInput.click();
    }

    function handleImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const data = e.target.result;
        const wb = XLSX.read(data, { type: 'array' });
        if (wb.Sheets.friends && wb.Sheets.items) {
          const friends = XLSX.utils.sheet_to_json(wb.Sheets.friends).map(r => r.friend).filter(Boolean);
          const items = XLSX.utils.sheet_to_json(wb.Sheets.items).map(r => ({
            id: r.id, name: r.name, amount: r.amount, splitMode: r.splitMode, paidBy: r.paidBy,
            participants: String(r.participants || '').split('|').filter(Boolean),
            customShares: r.customShares ? JSON.parse(r.customShares) : {}, note: r.note || ''
          }));
          applyImportedState({ friends, items });
        } else {
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const items = XLSX.utils.sheet_to_json(sheet).map(r => ({
            id: r.id, name: r.name, amount: r.amount, splitMode: r.splitMode || 'equal', paidBy: r.paidBy,
            participants: String(r.participants || '').split('|').filter(Boolean),
            customShares: r.customShares ? JSON.parse(r.customShares) : {}, note: r.note || ''
          }));
          const names = new Set();
          items.forEach(item => { (item.participants || []).forEach(n => names.add(n)); if (item.paidBy) names.add(item.paidBy); });
          applyImportedState({ friends: [...names], items });
        }
      };
      reader.readAsArrayBuffer(file);
      event.target.value = '';
    }

    function renderCustomAmountEditor(values = {}) {
      const mode = els.itemSplitMode.value;
      els.customAmountEditor.innerHTML = '';
      if (!state.friends.length) {
        els.customAmountEditor.innerHTML = '<div class="empty-note">請先新增朋友，才可輸入不均分金額。</div>';
        els.customAmountEditor.style.display = mode === 'custom' ? 'grid' : 'none';
        return;
      }
      state.friends.forEach(name => {
        const wrap = document.createElement('label');
        wrap.className = 'friend-check';
        const input = document.createElement('input');
        input.type = 'number';
        input.min = '0';
        input.step = '0.1';
        input.placeholder = '0.0';
        input.className = 'input';
        input.style.minHeight = '40px';
        input.style.padding = '0.55rem 0.65rem';
        input.dataset.customName = name;
        input.value = values[name] ?? '';
        wrap.appendChild(document.createElement('span')).textContent = name;
        wrap.appendChild(input);
        els.customAmountEditor.appendChild(wrap);
      });
      els.customAmountEditor.style.display = mode === 'custom' ? 'grid' : 'none';
    }

    function applyImportedState(data) {
      if (!data || !Array.isArray(data.friends) || !Array.isArray(data.items)) return;
      state.friends = data.friends;
      state.items = data.items.map(item => ({ id: item.id || crypto.randomUUID(), name: item.name || '', amount: roundToTenth(Number(item.amount || 0)), splitMode: item.splitMode || 'equal', paidBy: item.paidBy || data.friends[0] || '', participants: Array.isArray(item.participants) ? item.participants : [], customShares: item.customShares || {}, note: item.note || '' }));
      render();
    }

    function exportCsv() {
      const rows = state.items.map(item => ({ id: item.id, name: item.name, amount: item.amount, splitMode: item.splitMode, paidBy: item.paidBy, participants: item.participants.join('|'), customShares: JSON.stringify(item.customShares || {}), note: item.note || '' }));
      const ws = XLSX.utils.json_to_sheet(rows);
      const csv = XLSX.utils.sheet_to_csv(ws);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'bill-splitter-backup.csv'; a.click(); URL.revokeObjectURL(url);
    }

    function exportXlsx() {
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.items.map(item => ({ id: item.id, name: item.name, amount: item.amount, splitMode: item.splitMode, paidBy: item.paidBy, participants: item.participants.join('|'), customShares: JSON.stringify(item.customShares || {}), note: item.note || '' }))), 'items');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.friends.map(name => ({ friend: name }))), 'friends');
      XLSX.writeFile(wb, 'bill-splitter-backup.xlsx');
    }

    function importFile(kind) {
      els.fileInput.value = '';
      els.fileInput.accept = kind === 'csv' ? '.csv,text/csv' : '.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel';
      els.fileInput.dataset.kind = kind;
      els.fileInput.click();
    }

    function safeParseCustomShares(value) {
      if (!value) return {};
      try { return JSON.parse(value); } catch { return {}; }
    }

    function parseImportedItems(rows) {
      return rows.map(r => ({
        id: r.id || crypto.randomUUID(),
        name: r.name || '',
        amount: Number(r.amount || 0),
        splitMode: r.splitMode || 'equal',
        paidBy: r.paidBy || '',
        participants: Array.isArray(r.participants) ? r.participants.filter(Boolean) : String(r.participants || '').split('|').filter(Boolean),
        customShares: safeParseCustomShares(r.customShares),
        note: r.note || ''
      })).filter(item => item.name && item.paidBy);
    }

    function collectNamesFromItems(items) {
      const names = new Set();
      items.forEach(item => {
        (item.participants || []).forEach(n => names.add(n));
        if (item.paidBy) names.add(item.paidBy);
        Object.keys(item.customShares || {}).forEach(n => names.add(n));
      });
      return [...names];
    }

    function handleImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const kind = event.target.dataset.kind || '';
      const reader = new FileReader();
      reader.onload = e => {
        try {
          if (kind === 'csv' || file.name.toLowerCase().endsWith('.csv')) {
            const text = new TextDecoder('utf-8').decode(e.target.result);
            const wb = XLSX.read(text, { type: 'string' });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const items = parseImportedItems(XLSX.utils.sheet_to_json(sheet, { defval: '' }));
            applyImportedState({ friends: collectNamesFromItems(items), items });
          } else {
            const wb = XLSX.read(e.target.result, { type: 'array' });
            const friendSheetName = wb.SheetNames.find(name => name.toLowerCase() === 'friends');
            const itemSheetName = wb.SheetNames.find(name => name.toLowerCase() === 'items') || wb.SheetNames[0];
            const items = parseImportedItems(XLSX.utils.sheet_to_json(wb.Sheets[itemSheetName], { defval: '' }));
            const friends = friendSheetName
              ? XLSX.utils.sheet_to_json(wb.Sheets[friendSheetName], { defval: '' }).map(r => r.friend).filter(Boolean)
              : collectNamesFromItems(items);
            if (!items.length && !friends.length) {
              alert('匯入失敗，檔案內沒有可用的 friends 或 items 資料。');
              return;
            }
            applyImportedState({ friends: friends.length ? friends : collectNamesFromItems(items), items });
          }
        } catch (err) {
          alert('匯入失敗，請確認檔案為本系統匯出的 CSV 或 Excel 格式。');
        }
      };
      reader.readAsArrayBuffer(file);
      event.target.value = '';
    }

    function renderFriends() {
      els.friendList.innerHTML = '';
      els.paidBy.innerHTML = '';
      els.participantPicker.innerHTML = '';
      if (!state.friends.length) {
        els.friendList.innerHTML = '<div class="empty-note">尚未加入任何朋友，請先在上方新增朋友。</div>';
        els.paidBy.innerHTML = '<option value="">請先新增朋友</option>';
        els.participantPicker.innerHTML = '<div class="empty-note">加入朋友後，這裡才可勾選參與者。</div>';
        return;
      }
      state.friends.forEach((name, index) => {
        const row = document.createElement('div');
        row.className = 'friend-row';
        row.innerHTML = `
          <div class="friend-badge">${short(name)}</div>
          <div>
            <div style="font-weight:700;">${name}</div>
            <div class="hint">朋友 ${index + 1}</div>
          </div>
          <button class="btn btn-secondary" type="button" data-remove-friend="${name}" aria-label="移除 ${name}">移除</button>
        `;
        els.friendList.appendChild(row);
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        els.paidBy.appendChild(option);
        const label = document.createElement('label');
        label.className = 'friend-check';
        label.innerHTML = `<input type="checkbox" value="${name}" checked> <span>${name}</span>`;
        els.participantPicker.appendChild(label);
      });
    }

    function renderMetrics(result) {
      const total = state.items.reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const splitCount = state.items.reduce((sum, item) => sum + item.participants.length, 0);
      const payerOutside = state.items.filter(item => !item.participants.includes(item.paidBy)).length;
      const customCount = state.items.filter(item => item.splitMode === 'custom').length;
      const cards = [
        ['總金額', `$ ${currency(total)}`],
        ['分項數目', `${state.items.length} 項`],
        ['不均分項目', `${customCount} 項`],
        ['付款人不參與均分', `${payerOutside} 項`]
      ];
      els.metrics.innerHTML = cards.map(([label, value]) => `<div class="metric"><span class="label">${label}</span><strong>${value}</strong></div>`).join('');
      const invalid = result.validations.filter(v => Math.abs(v.diff) > 0.049);
      els.validationBox.innerHTML = result.validations.length === 0
        ? `<div class="ok-box">目前未有不均分項目，建立後會在此自動檢查金額總和。</div>`
        : invalid.length
          ? `<div class="warn-box">不均分檢查：${invalid.map(v => `${v.name} 無法新增，尚差 $ ${currency(Math.abs(v.diff))}`).join('；')}</div>`
          : `<div class="ok-box">不均分檢查：所有不均分項目的參與者金額總和都已對上分項金額。</div>`;
    }

    function moneyClass(value) {
      if (value < 0) return 'money-negative';
      if (value > 0) return 'money-positive';
      return '';
    }

    function renderTable(result) {
      els.billHead.innerHTML = '';
      els.billBody.innerHTML = '';
      els.billFoot.innerHTML = '';
      const headRow = document.createElement('tr');
      headRow.innerHTML = `<th>項目</th><th>sub-total</th><th>no. of ppl</th>${state.friends.map(name => `<th>${name}</th>`).join('')}<th>操作</th>`;
      els.billHead.appendChild(headRow);

      if (!result.rows.length) {
        const row = document.createElement('tr');
        row.innerHTML = `<td colspan="${state.friends.length + 3}"><div class="empty-note">尚未有分項，請在左側新增帳單項目。</div></td>`;
        els.billBody.appendChild(row);
        return;
      }

      result.rows.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>
            <div class="item-title">${item.name}</div>
            <div class="item-meta"><span class="badge equal">${item.splitMode === 'custom' ? '不均分' : '均分'}</span> <span class="badge advance">支付：${item.paidBy}</span></div>
            <div class="item-meta">參與均分：${item.participants.length ? item.participants.join('、') : '沒有'}</div>
            <div class="item-meta">${item.note || '—'}</div>
          </td>
          <td class="money-cell">${currency(item.amount)}</td>
          <td>${item.participants.length}</td>
          ${state.friends.map(name => {
            const value = item.shares[name] || 0;
            return `<td class="money-cell ${moneyClass(value)}">${value < 0 ? '-' : ''}${currency(Math.abs(value))}</td>`;
          }).join('')}
          <td><button class="remove-btn" type="button" data-remove-item="${item.id}">移除</button></td>
        `;
        els.billBody.appendChild(row);
      });

      const totals = Object.fromEntries(state.friends.map(name => [name, 0]));
      result.rows.forEach(item => state.friends.forEach(name => { totals[name] = roundToTenth(totals[name] + (item.shares[name] || 0)); }));
      const foot = document.createElement('tr');
      foot.innerHTML = `
        <td><strong>total</strong></td>
        <td class="money-cell"><strong>${currency(state.items.reduce((sum, item) => sum + Number(item.amount || 0), 0))}</strong></td>
        <td><strong>${state.items.reduce((sum, item) => sum + item.participants.length, 0)}</strong></td>
        ${state.friends.map(name => {
          const value = totals[name] || 0;
          return `<td class="money-cell ${moneyClass(value)}"><strong>${value < 0 ? '-' : ''}${currency(Math.abs(value))}</strong></td>`;
        }).join('')}
        <td>—</td>
      `;
      els.billFoot.appendChild(foot);
    }

    function renderSettlement(result) {
      els.personSummary.innerHTML = state.friends.map(name => {
        const net = result.net[name];
        const status = net > 0.049 ? '應付' : net < -0.049 ? '應收' : '已平衡';
        const tone = net > 0.049 ? 'var(--color-warning)' : net < -0.049 ? 'var(--color-success)' : 'var(--color-text)';
        return `<div class="settle-row"><div><strong>${name}</strong><div class="hint">代付總額 $ ${currency(result.paid[name])}</div></div><div style="color:${tone}; font-weight:700;">${status} $ ${currency(Math.abs(net))}</div></div>`;
      }).join('');

      const transfers = suggestTransfers(result.net);
      els.transferList.innerHTML = transfers.length
        ? transfers.map(t => `<div class="settle-row"><span>${t.from} → ${t.to}</span><strong>$ ${currency(t.amount)}</strong></div>`).join('')
        : `<div class="empty-note">目前所有人已經平衡，毋須再過數。</div>`;
    }

    function render() {
      renderFriends();
      const active = document.activeElement;
      const isCustomEditing = active && active.matches('[data-custom-name]');
      renderCustomAmountEditor(isCustomEditing ? getDraftCustomShares(active.dataset.customName, active.value) : getDraftCustomShares());
      const result = computeSettlement();
      renderMetrics(result);
      renderTable(result);
      renderSettlement(result);
    }

    function addFriend() {
      const name = els.friendName.value.trim();
      if (!name || state.friends.includes(name)) return;
      state.friends.push(name);
      els.friendName.value = '';
      render();
    }

    function removeFriend(name) {
      if (state.friends.length <= 1) return;
      state.friends = state.friends.filter(friend => friend !== name);
      state.items = state.items.map(item => {
        const participants = item.participants.filter(friend => friend !== name);
        const paidBy = item.paidBy === name ? (state.friends[0] || participants[0] || '') : item.paidBy;
        return { ...item, paidBy, participants };
      }).filter(item => item.paidBy);
      render();
    }

    function createItem() {
      const name = els.itemName.value.trim();
      const amount = Number(els.itemAmount.value);
      const paidBy = els.paidBy.value || state.friends[0];
      const splitMode = els.itemSplitMode.value;
      const note = els.itemNote.value.trim();
      const participants = [...els.participantPicker.querySelectorAll('input:checked')].map(input => input.value);
      const customShares = {};
      [...els.customAmountEditor.querySelectorAll('[data-custom-name]')].forEach(input => {
        if (participants.includes(input.dataset.customName)) customShares[input.dataset.customName] = roundToTenth(Number(input.value || 0));
      });
      if (!name || !amount || amount <= 0 || !paidBy) {
        alert('請先加入朋友，並填寫完整分項資料。');
        return;
      }
      state.items.unshift({ id: crypto.randomUUID(), name, amount: roundToTenth(amount), splitMode, paidBy, participants, customShares, note });
      els.itemName.value = '';
      els.itemAmount.value = '';
      els.itemNote.value = '';
      [...els.participantPicker.querySelectorAll('input')].forEach(input => input.checked = true);
      render();
    }

    function loadDemo() {
      state.items = [];
      render();
    }

    function resetApp() { state.items = []; render(); }

    function getDraftCustomShares(activeName = null, activeValue = null) {
      const values = {};
      if (!els.customAmountEditor) return values;
      [...els.customAmountEditor.querySelectorAll('[data-custom-name]')].forEach(input => { values[input.dataset.customName] = input.value; });
      if (activeName !== null) values[activeName] = activeValue;
      return values;
    }

    function removeItem(itemId) {
      state.items = state.items.filter(item => item.id !== itemId);
      render();
    }

    document.getElementById('addFriendBtn').addEventListener('click', addFriend);
    els.itemSplitMode.addEventListener('change', () => renderCustomAmountEditor(getDraftCustomShares()));
    document.getElementById('importCsvBtn').addEventListener('click', () => importFile('csv'));
    document.getElementById('importXlsxBtn').addEventListener('click', () => importFile('xlsx'));
    document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
    document.getElementById('exportXlsxBtn').addEventListener('click', exportXlsx);
    els.fileInput.addEventListener('change', handleImport);
    els.itemSplitMode.addEventListener('change', () => renderCustomAmountEditor(getDraftCustomShares()));
    document.getElementById('importCsvBtn').addEventListener('click', () => importFile('csv'));
    document.getElementById('importXlsxBtn').addEventListener('click', () => importFile('xlsx'));
    document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
    document.getElementById('exportXlsxBtn').addEventListener('click', exportXlsx);
    els.fileInput.addEventListener('change', handleImport);
    document.getElementById('createItemBtn').addEventListener('click', createItem);
    document.getElementById('addItemTop').addEventListener('click', () => document.getElementById('itemName').focus());
    document.getElementById('loadDemoBtn').addEventListener('click', loadDemo);
    document.getElementById('resetBtn').addEventListener('click', resetApp);
    document.addEventListener('click', (e) => {
      const removeBtn = e.target.closest('[data-remove-item]');
      if (removeBtn) removeItem(removeBtn.dataset.removeItem);
    });

    els.friendList.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-remove-friend]');
      if (btn) removeFriend(btn.dataset.removeFriend);
    });

    (function() {
      const toggle = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', theme);
      toggle.textContent = theme === 'dark' ? '☀' : '☾';
      toggle.addEventListener('click', () => {
        theme = theme === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', theme);
        toggle.textContent = theme === 'dark' ? '☀' : '☾';
      });
    })();

    render();
  </script>
</body>
</html>
